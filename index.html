<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazbear Archives Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .hub-card {
            background: #18181b;
            border: 1px solid #27272a;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .hub-card:hover {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
            transform: translateY(-5px);
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(74,222,128,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="relative overflow-hidden">
    <div class="scanline"></div>

    <div class="max-w-4xl mx-auto px-4 w-full z-10 text-center">
        <h1 class="text-4xl md:text-6xl font-bold mono text-green-400 mb-4 tracking-widest">FAZBEAR_ARCHIVES</h1>
        <p class="text-zinc-500 italic mb-12 mono">Select database terminal to access restricted files.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <a href="sotm.html" class="hub-card p-8 rounded-xl flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-700 flex items-center justify-center mb-6 group-hover:border-green-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:stroke-green-400 transition-colors"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h2 class="text-2xl font-bold mono text-white mb-2 group-hover:text-green-400 transition-colors">SOTM Logs</h2>
                <p class="text-zinc-400 mono text-sm">MCM Text Logs & Audio Captures</p>
            </a>

            <a href="classic.html" class="hub-card p-8 rounded-xl flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-700 flex items-center justify-center mb-6 group-hover:border-green-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:stroke-green-400 transition-colors"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold mono text-white mb-2 group-hover:text-green-400 transition-colors">Classic Calls</h2>
                <p class="text-zinc-400 mono text-sm">FNAF 1-3 Night Guard Transcripts</p>
            </a>
        </div>
        
        <div class="mt-16 text-zinc-600 text-xs mono uppercase tracking-widest">
            Property of Fazbear Entertainment. Unauthorized access strictly prohibited.
        </div>
    </div>
</body>
</html>
