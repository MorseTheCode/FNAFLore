<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Builder Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
        }
        .mono { font-family: 'Space Mono', monospace; }
        
        .panel {
            background: #121212;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
        }

        .input-field {
            width: 100%;
            background: #18181b;
            border: 1px solid #3f3f46;
            color: #e5e5e5;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
        }
        .input-field:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
        }
        .btn-primary { background: #4ade80; color: #0a0a0a; }
        .btn-primary:hover { background: #22c55e; }
        .btn-secondary { background: #27272a; color: #e5e5e5; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background: #3f3f46; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; }
        .btn-danger:hover { background: #991b1b; }

        .log-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 4px solid #333;
            transition: border-color 0.2s;
        }
        .log-item.audio { border-left-color: #a855f7; }
        .log-item.text { border-left-color: #4ade80; }
        .log-item.image { border-left-color: #3b82f6; }
        .log-item.memo { border-left-color: #eab308; }
        .log-item.order { border-left-color: #14b8a6; }
        
        /* Prevent hover/text interactions on all cards during active drag */
        body.is-dragging .log-item {
            pointer-events: none;
        }
        body.is-dragging .log-item.dragging-source {
            display: none !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: fixed;
            left: 0;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(74,222,128,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="p-4 md:p-8 relative">
    <div class="scanline"></div>

    <div class="max-w-[100rem] mx-auto px-4 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <a href="index.html" class="inline-flex items-center gap-2 text-zinc-400 hover:text-green-400 transition-colors mono text-sm mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    RETURN_TO_HUB
                </a>
                <h1 class="text-3xl font-bold mono text-green-400">ARCHIVE_BUILDER_CONSOLE</h1>
                <p class="text-zinc-500 italic">Generate and Edit Archive Databanks</p>
            </div>
            <div class="flex gap-3">
                <label class="btn btn-secondary flex items-center gap-2 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Import File
                    <input type="file" id="importFile" accept=".html,.json" class="hidden">
                </label>
                <button onclick="exportFiles()" class="btn btn-primary flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export Data
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Panel: Settings & Categories -->
            <div class="space-y-6">
                <div class="panel p-6">
                    <h2 class="text-xl font-bold mono text-white mb-4 border-b border-zinc-800 pb-2">Page Settings</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-zinc-400 text-xs mb-1 mono">Header Title</label>
                            <input type="text" id="pageHeader" class="input-field" placeholder="e.g. SOTM_ARCHIVES" oninput="updateData()">
                        </div>
                        <div>
                            <label class="block text-zinc-400 text-xs mb-1 mono">Subtitle</label>
                            <input type="text" id="pageSubtitle" class="input-field" placeholder="e.g. Documenting Audio Captures..." oninput="updateData()">
                        </div>
                        
                        <div class="mt-4 pt-4 border-t border-zinc-800">
                            <label class="block text-zinc-400 text-xs mb-1 mono">Data Source URL (JSON Link)</label>
                            <input type="text" id="jsonUrlInput" class="input-field" placeholder="content.json" value="content.json">
                            
                            <label class="flex items-center gap-2 mt-3 cursor-pointer text-zinc-300 text-sm mono">
                                <input type="checkbox" id="generateHtmlCheck" class="accent-green-500 w-4 h-4" checked>
                                Also Generate HTML Viewer Page
                            </label>
                        </div>
                    </div>
                </div>

                <div class="panel p-6">
                    <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                        <h2 class="text-xl font-bold mono text-white">Categories (Filters)</h2>
                        <button onclick="addCategory()" class="text-green-400 hover:text-green-300" title="Add Category">+</button>
                    </div>
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- Categories injected here -->
                    </div>
                </div>
            </div>

            <!-- Right Panel: Logs -->
            <div class="lg:col-span-2 panel p-6 flex flex-col" style="min-height: 600px;">
                <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                    <h2 class="text-xl font-bold mono text-white">Media Logs (<span id="logCount">0</span>)</h2>
                    <button onclick="addLog()" class="btn btn-secondary text-xs py-1">Add New Log</button>
                </div>
                <div class="text-[10px] text-zinc-400 mb-3 border border-zinc-800 p-2 rounded bg-zinc-900/50 flex gap-4">
                    <span><b class="text-zinc-300">Strikethrough:</b> ~~text~~</span>
                    <span><b class="text-zinc-300">Circle text:</b> ((text))</span>
                </div>
                <div id="logsContainer" class="space-y-4 flex-grow overflow-y-auto pr-2" ondragover="handleDragOver(event)">
                    <!-- Logs injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        function escapeHtmlVal(str) {
            return (str||'').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatText(s) {
            if (!s) return '';
            s = s.replace(/~~(.*?)~~/g, '<del class="opacity-70 text-red-400 decoration-red-500">$1</del>');
            s = s.replace(/\(\((.*?)\)\)/g, '<span class="inline-block align-middle whitespace-nowrap border border-red-500/70 text-red-400 px-2 py-0.5 leading-none mx-0.5 text-center" style="border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;">$1</span>');
            return s;
        }

        let appData = {
            header: "NEW_ARCHIVE_DATABASE",
            subtitle: "Classified Internal Logs",
            categories: [
                { id: "admin", label: "Admin" },
                { id: "staff_chat", label: "Staff Chat" }
            ],
            logs: []
        };

        let currentBuilderFilter = 'all';

        // Init
        document.getElementById('pageHeader').value = appData.header;
        document.getElementById('pageSubtitle').value = appData.subtitle;
        renderCategories();
        renderLogs();

        // Data Update Helpers
        function updateData() {
            appData.header = document.getElementById('pageHeader').value || "UNTITLED_ARCHIVE";
            appData.subtitle = document.getElementById('pageSubtitle').value || "";
        }

        // --- Categories Management ---
        function setBuilderFilter(id) {
            currentBuilderFilter = id;
            renderCategories();
            renderLogs();
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = `
                <button onclick="setBuilderFilter('all')" class="w-full text-left px-3 py-2 rounded text-sm mb-2 transition-colors ${currentBuilderFilter === 'all' ? 'bg-green-900/30 border border-green-500/50 text-green-400' : 'bg-zinc-900/50 border border-transparent text-zinc-400 hover:bg-zinc-800'}">
                    Show All Entries
                </button>
            `;
            
            appData.categories.forEach((cat, index) => {
                const div = document.createElement('div');
                const isActive = currentBuilderFilter === cat.id;
                div.className = `flex gap-2 items-center px-2 py-1 mb-1 rounded border transition-colors ${isActive ? 'bg-green-900/20 border-green-500/30' : 'border-transparent hover:bg-zinc-900/50'}`;
                
                div.innerHTML = `
                    <div class="flex flex-col items-center justify-center shrink-0 pr-1 border-r border-zinc-800/50">
                        <button onclick="moveCategory(${index}, -1)" class="text-zinc-500 hover:text-green-400 px-1 text-xs" title="Move Up">▲</button>
                        <button onclick="moveCategory(${index}, 1)" class="text-zinc-500 hover:text-green-400 px-1 text-xs" title="Move Down">▼</button>
                    </div>
                    <div class="flex-grow cursor-pointer pl-1" onclick="setBuilderFilter('${cat.id}')">
                        <input type="text" value="${cat.label.replace(/"/g, '&quot;')}" class="w-full bg-transparent border-b border-transparent focus:border-green-500 outline-none text-sm ${isActive ? 'text-green-400 font-bold' : 'text-zinc-200'}" onclick="event.stopPropagation()" onchange="updateCatLabel(${index}, this.value)">
                        <div class="text-[10px] text-zinc-500 mono mt-1">ID: ${cat.id}</div>
                    </div>
                    <button onclick="removeCategory(${index})" class="text-red-500 hover:text-red-400 p-2" title="Delete Category">×</button>
                `;
                container.appendChild(div);
            });
        }

        function moveCategory(index, direction) {
            if (index + direction >= 0 && index + direction < appData.categories.length) {
                const temp = appData.categories[index];
                appData.categories[index] = appData.categories[index + direction];
                appData.categories[index + direction] = temp;
                renderCategories();
                renderLogs();
            }
        }

        function addCategory() {
            const newLabel = "New Category";
            let newId = "new_category";
            let counter = 1;
            while(appData.categories.some(c => c.id === newId)) {
                newId = `new_category_${counter++}`;
            }
            appData.categories.push({ id: newId, label: newLabel });
            renderCategories();
            renderLogs();
        }

        function updateCatLabel(index, newLabel) {
            const oldId = appData.categories[index].id;
            let newId = newLabel.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
            if (!newId) newId = 'category';
            
            let counter = 1;
            let finalId = newId;
            while(appData.categories.some((c, i) => c.id === finalId && i !== index)) {
                finalId = `${newId}_${counter++}`;
            }

            appData.categories[index].label = newLabel;
            appData.categories[index].id = finalId;

            // Update associated tags in logs
            appData.logs.forEach(log => {
                const tagIdx = log.tags.indexOf(oldId);
                if (tagIdx > -1) {
                    log.tags[tagIdx] = finalId;
                }
            });

            if (currentBuilderFilter === oldId) {
                currentBuilderFilter = finalId;
            }

            renderCategories();
            renderLogs();
        }

        function removeCategory(index) {
            const catId = appData.categories[index].id;
            appData.categories.splice(index, 1);
            appData.logs.forEach(log => {
                log.tags = log.tags.filter(t => t !== catId);
            });
            if (currentBuilderFilter === catId) {
                currentBuilderFilter = 'all';
            }
            renderCategories();
            renderLogs();
        }

        // --- Logs Management ---
        function createDefaultLog() {
            return {
                id: `LOG_${Date.now()}`,
                title: "",
                location: "",
                content: "",
                type: "text",
                isAudio: false,
                audioUrl: "",
                imageUrl: "",
                imageUrls: [""],
                memoDate: "",
                memoTo: "",
                memoFrom: "",
                memoCC: "",
                memoSubject: "",
                memoSignature: "",
                orderDate: "",
                orderPickup: "",
                orderName: "",
                orderBody: "",
                orderQty: "",
                orderMaterials: "",
                orderDetails: "",
                orderSpecial: "",
                tags: currentBuilderFilter !== 'all' ? [currentBuilderFilter] : []
            };
        }

        function addLog() {
            appData.logs.unshift(createDefaultLog());
            renderLogs();
        }

        function removeLog(id) {
            appData.logs = appData.logs.filter(l => l.id !== id);
            renderLogs();
        }

        // --- Drag and Drop Logic ---
        let draggedLogEl = null;
        let dragPlaceholder = null;
        let cachedDraggables = []; 
        let currentDragTarget = undefined;

        function handleDragStart(e, id) {
            draggedLogEl = e.currentTarget;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id);
            
            dragPlaceholder = document.createElement('div');
            dragPlaceholder.className = 'border-2 border-dashed border-green-500/50 bg-green-900/10 rounded-lg transition-all duration-200';
            dragPlaceholder.style.height = `${draggedLogEl.offsetHeight}px`;

            document.body.classList.add('is-dragging');
            draggedLogEl.classList.add('dragging-source');
            currentDragTarget = undefined;

            setTimeout(() => {
                draggedLogEl.style.display = 'none';
                draggedLogEl.parentNode.insertBefore(dragPlaceholder, draggedLogEl.nextSibling);
                cachedDraggables = [...document.querySelectorAll('#logsContainer .log-item:not(.dragging-source)')];
            }, 0);
        }

        function handleDragOver(e) {
            e.preventDefault();
            if (!draggedLogEl || !dragPlaceholder) return;
            
            const container = document.getElementById('logsContainer');
            const afterElement = getDragAfterElement(e.clientY);
            
            if (afterElement !== currentDragTarget) {
                currentDragTarget = afterElement;
                if (afterElement == null) {
                    container.appendChild(dragPlaceholder);
                } else {
                    container.insertBefore(dragPlaceholder, afterElement);
                }
            }
        }

        function getDragAfterElement(y) {
            return cachedDraggables.find(child => {
                const box = child.getBoundingClientRect();
                return y < box.top + box.height / 2;
            });
        }

        function handleDragEnd(e) {
            if (!draggedLogEl) return;
            
            document.body.classList.remove('is-dragging');
            draggedLogEl.classList.remove('dragging-source');
            draggedLogEl.style.display = 'flex';
            
            if (dragPlaceholder && dragPlaceholder.parentNode) {
                dragPlaceholder.parentNode.replaceChild(draggedLogEl, dragPlaceholder);
            }
            
            const currentIds = [...document.querySelectorAll('#logsContainer .log-item')].map(el => el.dataset.id);
            
            let indices = currentIds.map(id => appData.logs.findIndex(l => l.id === id)).sort((a, b) => a - b);
            let newlyOrderedLogs = currentIds.map(id => appData.logs.find(l => l.id === id));
            
            indices.forEach((globalIndex, i) => {
                appData.logs[globalIndex] = newlyOrderedLogs[i];
            });

            draggedLogEl.setAttribute('draggable', 'false'); 
            draggedLogEl = null;
            dragPlaceholder = null;
            cachedDraggables = [];
            currentDragTarget = undefined;
            renderLogs();
        }

        function updateLog(id, field, value, isCheckbox = false) {
            const log = appData.logs.find(l => l.id === id);
            if (!log) return;
            
            if (isCheckbox) {
                if (value) {
                    if (!log.tags.includes(field)) log.tags.push(field);
                } else {
                    log.tags = log.tags.filter(t => t !== field);
                }
                
                if (currentBuilderFilter !== 'all' && currentBuilderFilter === field && !value) {
                    renderLogs();
                }
            } else {
                log[field] = value;
                if (field === 'isAudio') {
                    log.type = value ? 'audio' : 'text'; 
                    renderLogs();
                }
                if (field === 'type') {
                    log.isAudio = value === 'audio'; 
                    renderLogs();
                }
            }
        }

        function addLogImage(id) {
            const input = document.getElementById(`new-img-url-${id}`);
            const url = input.value.trim();
            if (url) {
                const log = appData.logs.find(l => l.id === id);
                if (log) {
                    if (!log.imageUrls) log.imageUrls = [];
                    log.imageUrls = log.imageUrls.filter(u => u.trim() !== '');
                    log.imageUrls.push(url);
                    renderLogs();
                }
            }
        }

        function uploadLogImages(id, files) {
            const log = appData.logs.find(l => l.id === id);
            if (!log) return;
            if (!log.imageUrls) log.imageUrls = [];
            log.imageUrls = log.imageUrls.filter(u => u.trim() !== '');

            const inputField = document.getElementById(`new-img-url-${id}`);
            let prefix = inputField ? inputField.value.trim() : "";
            
            if (!prefix) {
                prefix = "./posters/";
            } else if (!prefix.endsWith('/')) {
                prefix += "/";
            }

            Array.from(files).forEach(file => {
                log.imageUrls.push(prefix + file.name);
            });
            
            if (inputField) inputField.value = "";
            renderLogs();
        }

        function moveLogImage(id, index, direction) {
            const log = appData.logs.find(l => l.id === id);
            if (!log || !log.imageUrls) return;
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < log.imageUrls.length) {
                const temp = log.imageUrls[index];
                log.imageUrls[index] = log.imageUrls[newIndex];
                log.imageUrls[newIndex] = temp;
                renderLogs();
            }
        }

        function removeLogImage(id, index) {
            const log = appData.logs.find(l => l.id === id);
            if (!log || !log.imageUrls) return;
            log.imageUrls.splice(index, 1);
            if (log.imageUrls.length === 0) log.imageUrls = [""];
            renderLogs();
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = '';
            
            const logsToRender = currentBuilderFilter === 'all' 
                ? appData.logs 
                : appData.logs.filter(l => l.tags.includes(currentBuilderFilter));

            document.getElementById('logCount').innerText = logsToRender.length;

            logsToRender.forEach((log, index) => {
                log.type = log.type || (log.isAudio ? 'audio' : 'text'); 
                const div = document.createElement('div');
                div.className = `log-item p-4 rounded-lg flex flex-col gap-3 ${log.type}`;
                div.setAttribute('draggable', 'false');
                div.setAttribute('data-id', log.id);
                div.ondragstart = (e) => handleDragStart(e, log.id);
                div.ondragend = (e) => handleDragEnd(e);
                
                const tagsHtml = appData.categories.map(cat => `
                    <label class="inline-flex items-center gap-1 text-xs text-zinc-400 cursor-pointer">
                        <input type="checkbox" class="accent-green-500" 
                               ${log.tags.includes(cat.id) ? 'checked' : ''} 
                               onchange="updateLog('${log.id}', '${cat.id}', this.checked, true)">
                        ${cat.label}
                    </label>
                `).join('');

                let dynamicFieldsHtml = '';
                if (log.type === 'audio') {
                    dynamicFieldsHtml = `
                        <div class="mt-2 border-t border-zinc-800/50 pt-3">
                            <label class="block text-purple-400 text-[10px] uppercase mb-1">Audio File URL (Optional)</label>
                            <input type="text" class="input-field border-purple-900/30 focus:border-purple-500" value="${escapeHtmlVal(log.audioUrl)}" placeholder="e.g. https://example.com/audio.mp3" oninput="updateLog('${log.id}', 'audioUrl', this.value)">
                        </div>
                    `;
                } else if (log.type === 'image') {
                    const urls = (log.imageUrls || (log.imageUrl ? [log.imageUrl] : [])).filter(u => u.trim() !== '');
                    let galleryHtml = '<div class="flex gap-2 overflow-x-auto pb-2 mt-2 scrollbar-hide">';
                    urls.forEach((url, i) => {
                        galleryHtml += `
                            <div class="relative shrink-0 w-24 h-24 border border-zinc-700 rounded bg-zinc-900 group">
                                <img src="${escapeHtmlVal(url)}" class="w-full h-full object-contain rounded">
                                <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2 rounded">
                                    <div class="flex gap-2">
                                        <button class="w-6 h-6 flex items-center justify-center bg-zinc-800 hover:bg-zinc-600 rounded text-xs text-white" onclick="moveLogImage('${log.id}', ${i}, -1)" title="Move Left">◀</button>
                                        <button class="w-6 h-6 flex items-center justify-center bg-zinc-800 hover:bg-zinc-600 rounded text-xs text-white" onclick="moveLogImage('${log.id}', ${i}, 1)" title="Move Right">▶</button>
                                    </div>
                                    <button class="px-2 py-0.5 bg-red-900/80 hover:bg-red-700 rounded text-[10px] uppercase text-white font-bold" onclick="removeLogImage('${log.id}', ${i})">Remove</button>
                                </div>
                            </div>
                        `;
                    });
                    if (urls.length === 0) {
                        galleryHtml += '<div class="text-zinc-500 text-xs italic py-4">No images added. Add a URL or upload files.</div>';
                    }
                    galleryHtml += '</div>';

                    dynamicFieldsHtml = `
                        <div class="mt-2 border-t border-zinc-800/50 pt-3">
                            <label class="block text-blue-400 text-[10px] uppercase mb-1">Image Gallery</label>
                            <div class="flex flex-col sm:flex-row gap-2 mb-2 items-stretch sm:items-center">
                                <input type="text" id="new-img-url-${log.id}" class="input-field border-blue-900/30 focus:border-blue-500 py-1.5 text-xs flex-grow" placeholder="Image URL or local folder path (defaults to ./posters/)">
                                <button class="btn btn-secondary py-1.5 px-3 text-xs whitespace-nowrap" onclick="addLogImage('${log.id}')">Add URL</button>
                                <label class="btn btn-primary py-1.5 px-3 text-xs whitespace-nowrap cursor-pointer mb-0 text-center" title="Select files to generate local paths">
                                    Add Local Files
                                    <input type="file" multiple accept="image/*" class="hidden" onchange="uploadLogImages('${log.id}', this.files)">
                                </label>
                            </div>
                            ${galleryHtml}
                        </div>
                    `;

            reader.onload = function(evt) {
                const content = evt.target.result;
                
                if (file.name.endsWith('.json')) {
                    try {
                        appData = JSON.parse(content);

                    }
                } else {
                    parseImportedHTML(content);
                }
                document.getElementById('importFile').value = ''; // reset input
            };
            reader.readAsText(file);
        });

        function parseImportedHTML(html) {
            // 1. Try to find the modern JSON data island
            const dataIslandMatch = html.match(/<script id="archive-data" type="application\/json">([\s\S]*?)<\/script>/);
            
            if (dataIslandMatch && dataIslandMatch[1]) {
                try {
                    appData = JSON.parse(dataIslandMatch[1]);
                    appData.logs.forEach(l => {
                        l.type = l.type || (l.isAudio ? 'audio' : 'text'); // Normalization
                        l.tags = l.tags || [];
                        if (l.imageUrl && !l.imageUrls) l.imageUrls = [l.imageUrl];
                        if (!l.imageUrls) l.imageUrls = [""];
                    });
                    document.getElementById('pageHeader').value = appData.header;
                    document.getElementById('pageSubtitle').value = appData.subtitle;
                    renderCategories();
                    renderLogs();
                    return;
                } catch (e) {
                    console.error("Failed to parse embedded JSON", e);
                }
            }

            // 2. Fallback: Legacy Parser for classic.html & sotm.html
            console.log("Attempting legacy parse...");
            try {
                const headerMatch = html.match(/<h1[^>]*>(.*?)<\/h1>/);
                const subMatch = html.match(/<p[^>]*italic[^>]*>(.*?)<\/p>/);
                
                appData.header = headerMatch ? headerMatch[1].replace(/<[^>]+>/g, '') : "IMPORTED_ARCHIVE";
                appData.subtitle = subMatch ? subMatch[1].replace(/<[^>]+>/g, '') : "";

                appData.categories = [];
                const catRegex = /<button[^>]*class="category-btn[^"]*"[^>]*data-cat="([^"]+)"[^>]*>(.*?)<\/button>/g;
                let match;
                while ((match = catRegex.exec(html)) !== null) {
                    if (!['all', 'text', 'audio', 'image', 'memo', 'order'].includes(match[1]) && !match[1].includes('$')) {
                        appData.categories.push({ id: match[1], label: match[2] });
                    }
                }

                appData.logs = [];
                const extractArray = (varName) => {
                    const startStr = `const ${varName} = [`;
                    const startIdx = html.indexOf(startStr);
                    if (startIdx === -1) return [];
                    const endIdx = html.indexOf('];', startIdx);
                    if (endIdx === -1) return [];
                    const arrStr = html.substring(startIdx + startStr.length - 1, endIdx + 1);
                    try { return new Function(`return ${arrStr};`)(); } catch(e) { return []; }
                };

                const legacyAudio = extractArray('audioLogs');
                const legacyText = extractArray('textLogs');

                const recoverTags = (logObj) => {
                    const tags = [];
                    const searchStr = ((logObj.id || '') + " " + (logObj.title || '') + " " + (logObj.content || '')).toLowerCase();
                    const key = (logObj.id || '').toLowerCase();
                    const loc = (logObj.location || '');

                    appData.categories.forEach(cat => {
                        const cId = cat.id;
                        if (cId === 'fnaf1' && loc === 'FNAF 1') tags.push(cId);
                        if (cId === 'fnaf2' && loc === 'FNAF 2') tags.push(cId);
                        if (cId === 'fnaf3' && loc === 'FNAF 3') tags.push(cId);
                        if (cId === 'admin' && searchStr.includes('admin')) tags.push(cId);
                        if (cId === 'mcm' && (key.includes('misc_3') && !['misc_31', 'misc_32'].includes(key) || key.includes('misc12') || key.includes('misc10') || key.includes('misc11') || key === 'misc19')) tags.push(cId);
                        if (cId === 'internal' && (key.includes('misc06') || key.includes('misc07') || key.includes('misc13') || key.includes('doll01') || key.includes('doll02') || searchStr.includes('theater') || ['misc03', 'misc05', 'misc24', 'misc25a', 'doll03', 'doll04'].includes(key))) tags.push(cId);
                        if (cId === 'fiona' && (['misc04', 'misc21', 'misc22', 'nc_fiona_inventorhouse'].includes(key) || (!['misc03', 'misc05', 'misc19', 'misc27a', 'misc27b'].includes(key) && searchStr.includes('fiona')))) tags.push(cId);
                        if (cId === 'wa' && (searchStr.includes('w.a.') || searchStr.includes('franchise') || ['misc01', 'misc02', 'misc14'].includes(key))) tags.push(cId);
                        if (cId === 'edwin' && (!['admin12', 'misc03', 'misc04', 'misc13', 'misc22', 'misc23', 'nc_fiona_inventorhouse'].includes(key) && (searchStr.includes('edwin') || searchStr.includes('inventorhouse') || searchStr.includes("ed's modular") || searchStr.includes('ed,') || ['misc27a', 'misc27b'].includes(key)))) tags.push(cId);
                        if (cId === 'recovery' && ['misc26', 'misc28', 'misc29'].includes(key)) tags.push(cId);
                        if (cId === 'sleepymoon' && (key.includes('costumeback') || ['misc_31', 'misc_32'].includes(key))) tags.push(cId);
                    });
                    
                    return [...new Set(tags)]; 
                };

                if (legacyAudio) {
                    legacyAudio.forEach((l, i) => {
                        appData.logs.push({
                            id: `AL_${Date.now()}_${i}`, title: l.title || '', location: l.location || '',
                            content: l.content || '', type: 'audio', isAudio: true, audioUrl: l.audioUrl || '', imageUrls: [""], tags: l.tags && l.tags.length > 0 ? l.tags : recoverTags(l)
                        });
                    });
                }
                if (legacyText) {
                    legacyText.forEach((l, i) => {
                        appData.logs.push({
                            id: l.id || `TL_${Date.now()}_${i}`, title: l.title || '', location: l.location || '',
                            content: l.content || '', type: 'text', isAudio: false, audioUrl: '', imageUrls: [""], tags: l.tags && l.tags.length > 0 ? l.tags : recoverTags(l)
                        });
                    });
                }

                document.getElementById('pageHeader').value = appData.header;
                document.getElementById('pageSubtitle').value = appData.subtitle;
                renderCategories();
                renderLogs();
            } catch (err) {
                alert("Error parsing file. Ensure it's a valid archive HTML.");
                console.error(err);
            }
        }

                <div class="flex items-stretch gap-2 w-full mt-1 relative">
                    <button class="scroll-arrow left-arrow hidden" onclick="scrollContainer('filterBar', -200)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <div id="filterBar" class="scroll-container w-full" onscroll="updateArrows('filterBar')">
                        <!-- Injected via fetch -->
                        <button class="category-btn active shrink-0" data-cat="all">All Logs</button>
                    </div>
                    <button class="scroll-arrow right-arrow hidden" onclick="scrollContainer('filterBar', 200)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                
                <div id="subFilterWrapper" class="hidden items-stretch gap-2 w-full relative">
                    <button class="scroll-arrow left-arrow hidden" onclick="scrollContainer('subFilterBar', -200)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <div id="subFilterBar" class="scroll-container w-full" onscroll="updateArrows('subFilterBar')">
                        <button class="type-btn active text-xs px-3 py-1.5 mono shrink-0" data-type="all">All Types</button>
                        <button class="type-btn text-xs px-3 py-1.5 mono shrink-0" data-type="text">Text Only</button>
                        <button class="type-btn text-xs px-3 py-1.5 mono shrink-0" data-type="audio">Audio Only</button>
                        <button class="type-btn text-xs px-3 py-1.5 mono shrink-0" data-type="image">Image Only</button>
                        <button class="type-btn text-xs px-3 py-1.5 mono shrink-0" data-type="memo">Memo Only</button>
                        <button class="type-btn text-xs px-3 py-1.5 mono shrink-0" data-type="order">Order Form</button>
                    </div>
                    <button class="scroll-arrow right-arrow hidden" onclick="scrollContainer('subFilterBar', 200)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>
        </header>

        <div id="logDisplay" class="space-y-8"></div>
    </div>

    <!-- Modal -->
    <div id="imageModal" class="fixed inset-0 z-[9999] bg-black/95 hidden items-center justify-center p-4 md:p-8 opacity-0 transition-opacity duration-300 backdrop-blur-sm" onclick="closeImageModal()">
        <div class="relative max-w-5xl w-full max-h-full flex items-center justify-center" onclick="event.stopPropagation()">
            <button class="absolute -top-12 right-0 text-zinc-400 hover:text-white transition-colors p-2" onclick="closeImageModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <img id="modalImage" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg border border-zinc-800 shadow-2xl">
        </div>
    </div>

    <script id="archive-data" type="application/json">${safeJsonData}${scriptEnd}
    ${scriptStart}
        const jsonSourceUrl = "${jsonUrl}";
        let appData = { header: "", subtitle: "", categories: [], logs: [] };
        
        let currentCategory = 'all';
        let currentType = 'all';
        let currentSearch = '';

        async function init() {
            const absoluteUrl = new URL(jsonSourceUrl, window.location.href).href;
            const cacheKey = 'mcm_archive_cache_' + absoluteUrl.replace(/[^a-zA-Z0-9]/g, '_');
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                try {
                    appData = JSON.parse(cached);
                    populateUI();
                    render();
                    setTimeout(() => { updateArrows('filterBar'); }, 100);
                } catch(e) {}
            }

            try {
                const response = await fetch(jsonSourceUrl + '?t=' + Date.now(), { cache: 'no-store' });
                if(!response.ok) throw new Error("Network response was not ok");
                const serverData = await response.json();
                
                appData = serverData;
                localStorage.setItem(cacheKey, JSON.stringify(appData));
                populateUI();
                render();
                setTimeout(() => { updateArrows('filterBar'); }, 100);
            } catch (error) {
                console.error("Failed to load archive data:", error);
                if (!cached) {
                    document.getElementById('page-title').textContent = "CONNECTION ERROR";
                    document.getElementById('page-subtitle').textContent = "Failed to retrieve databank. Make sure content json is accessible.";
                }
            }
        }

        function populateUI() {
            document.getElementById('page-title').textContent = appData.header;
            document.getElementById('page-subtitle').textContent = appData.subtitle;
            document.title = appData.header;
            
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = '<button class="category-btn active shrink-0" data-cat="all">All Logs</button>' + 
                appData.categories.map(c => \`<button class="category-btn shrink-0" data-cat="\${escapeHtml(c.id)}">\${escapeHtml(c.label)}</button>\`).join('');
            
            appData.logs.forEach(l => {
                l.type = l.type || (l.isAudio ? 'audio' : 'text');
                l.tags = l.tags || [];
                if (l.imageUrl && !l.imageUrls) l.imageUrls = [l.imageUrl];
                if (!l.imageUrls) l.imageUrls = [""];
            });
        }

        function escapeRegExp(string) { return string.replace(/[.*+?^\\$\\{\\}()|\\[\\]\\\\]/g, '\\\\$&'); }
        function escapeHtml(unsafe) {
            return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        function formatText(s) {
            if (!s) return '';
            s = s.replace(/~~(.*?)~~/g, '<del class="opacity-70 text-red-400 decoration-red-500">$1</del>');
            s = s.replace(/\\(\\((.*?)\\)\\)/g, '<span class="inline-block align-middle whitespace-nowrap border border-red-500/70 text-red-400 px-2 py-0.5 leading-none mx-0.5 text-center" style="border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;">$1</span>');
            return s;
        }

        // --- Image Modal Logic ---
        function openImageModal(url) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImage').src = url;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }
        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('modalImage').src = '';
            }, 300);
        }

        // --- Audio Player Logic ---
        function toggleAudio(btn, audioId) {
            var audio = document.getElementById(audioId);
            if (audio.paused) {
                document.querySelectorAll('audio').forEach(function(a) { 
                    if(a !== audio) { 
                        a.pause(); 
                        var container = a.closest('.audio-player-container');
                        if (container) {
                            var b = container.querySelector('.play-pause-btn');
                            if(b) b.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                        }
                    }
                });
                audio.play();
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
            } else {
                audio.pause();
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            }
        }
        function updateProgress(audio) {
            var container = audio.closest('.audio-player-container');
            var fill = container.querySelector('.progress-fill');
            var timeDisplay = container.querySelector('.time-display');
            var percent = (audio.currentTime / audio.duration) * 100 || 0;
            fill.style.width = percent + '%';
            timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration || 0);
        }
        function setDuration(audio) {
            var container = audio.closest('.audio-player-container');
            var timeDisplay = container.querySelector('.time-display');
            timeDisplay.textContent = '0:00 / ' + formatTime(audio.duration);
        }
        function resetPlayer(audio) {
            var container = audio.closest('.audio-player-container');
            var btn = container.querySelector('.play-pause-btn');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            var fill = container.querySelector('.progress-fill');
            fill.style.width = '0%';
            var timeDisplay = container.querySelector('.time-display');
            timeDisplay.textContent = '0:00 / ' + formatTime(audio.duration || 0);
        }
        function seekAudio(e, audioId) {
            var audio = document.getElementById(audioId);
            var bar = e.currentTarget;
            var rect = bar.getBoundingClientRect();
            var clickX = e.clientX - rect.left;
            var percent = clickX / rect.width;
            audio.currentTime = percent * audio.duration;
        }
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function getGroupedLogs(logs) {
            const groups = appData.categories.map(cat => ({
                name: cat.label,
                match: (l) => (l.tags || []).includes(cat.id)
            }));
            
            groups.push({ name: "Uncategorized Archives", match: (l) => !l.tags || l.tags.length === 0 });

            const result = [];
            const processedIds = new Set();

            groups.forEach(group => {
                const groupLogs = logs.filter(l => !processedIds.has(l.id) && group.match(l));
                if (groupLogs.length > 0) {
                    result.push({ title: group.name, logs: groupLogs });
                    groupLogs.forEach(l => processedIds.add(l.id));
                }
            });
            return result;
        }

        function scrollContainer(id, amount) {
            document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' });
        }

        function updateArrows(id) {
            const container = document.getElementById(id);
            if (!container) return;
            const wrapper = container.parentElement;
            const leftArrow = wrapper.querySelector('.left-arrow');
            const rightArrow = wrapper.querySelector('.right-arrow');
            
            if (leftArrow && rightArrow) {
                if (container.scrollLeft > 0) {
                    leftArrow.classList.remove('hidden');
                } else {
                    leftArrow.classList.add('hidden');
                }
                
                if (container.scrollLeft < container.scrollWidth - container.clientWidth - 2) {
                    rightArrow.classList.remove('hidden');
                } else {
                    rightArrow.classList.add('hidden');
                }
            }
        }

        window.addEventListener('resize', () => {
            updateArrows('filterBar');
            if (!document.getElementById('subFilterWrapper').classList.contains('hidden')) {
                updateArrows('subFilterBar');
            }
        });

        function render() {
            const display = document.getElementById('logDisplay');
            display.innerHTML = '';

            const subFilterWrapper = document.getElementById('subFilterWrapper');
            if (['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) {
                subFilterWrapper.classList.add('hidden');
                subFilterWrapper.classList.remove('flex');
                currentType = 'all';
                document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === 'all'));
            } else {
                subFilterWrapper.classList.remove('hidden');
                subFilterWrapper.classList.add('flex');
                setTimeout(() => updateArrows('subFilterBar'), 10);
            }

            let filtered = appData.logs.filter(log => {
                const searchLower = currentSearch.toLowerCase();
                const matchesSearch = (log.title || '').toLowerCase().includes(searchLower) || 
                                      (log.content || '').toLowerCase().includes(searchLower) ||
                                      (log.location || '').toLowerCase().includes(searchLower);
                
                let matchesCat = currentCategory === 'all';
                if (!matchesCat) {
                    if (['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) {
                        matchesCat = log.type === currentCategory;
                    } else {
                        matchesCat = (log.tags || []).includes(currentCategory);
                    }
                }
                
                const matchesType = currentType === 'all' ? true : log.type === currentType;

                return matchesSearch && matchesCat && matchesType;
            });

            document.getElementById('logCount').innerText = filtered.length;

            let cols = parseInt(document.getElementById('colSlider').value);
            document.getElementById('colValue').textContent = cols;
            let gridClass = 'grid gap-6';
            if (cols === 1) gridClass += ' grid-cols-1';
            else if (cols === 2) gridClass += ' grid-cols-1 md:grid-cols-2';
            else if (cols === 3) gridClass += ' grid-cols-1 md:grid-cols-2 lg:grid-cols-3';
            else if (cols === 4) gridClass += ' grid-cols-1 md:grid-cols-2 lg:grid-cols-4';
            else if (cols === 5) gridClass += ' grid-cols-1 md:grid-cols-3 lg:grid-cols-5';

            if ((currentCategory === 'all' || ['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) && !currentSearch) {
                const grouped = getGroupedLogs(filtered);
                grouped.forEach(group => {
                    const groupSection = document.createElement('div');
                    groupSection.className = 'context-group';
                    groupSection.innerHTML = \`<div class="group-header mono">\${escapeHtml(group.title)}</div>\`;
                    
                    const grid = document.createElement('div');
                    grid.className = gridClass;
                    
                    group.logs.forEach(log => grid.appendChild(createCard(log)));
                    groupSection.appendChild(grid);
                    display.appendChild(groupSection);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = gridClass;
                filtered.forEach(log => grid.appendChild(createCard(log)));
                display.appendChild(grid);
            }
        }

        function createCard(log) {
            const div = document.createElement('div');
            div.className = 'log-card p-5 rounded-xl flex flex-col gap-3';
            
            let displayTitle = escapeHtml(log.title);
            let displayContent = escapeHtml(log.content);
            if (currentSearch) {
                const regex = new RegExp(\`(\${escapeRegExp(currentSearch)})\`, 'gi');
                displayTitle = displayTitle.replace(regex, '<span class="highlight">$1</span>');
                displayContent = displayContent.replace(regex, '<span class="highlight">$1</span>');
            }
            displayTitle = formatText(displayTitle);
            displayContent = formatText(displayContent);

            const copySvg = \`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>\`;

            const locHtml = log.location ? \`<span class="location-badge mono">\${formatText(escapeHtml(log.location))}</span>\` : '';
            
            let typeBadgeClass = "title-badge mono";
            let typeBadgeLabel = formatText(escapeHtml(log.title));
            if (log.type === 'audio') { typeBadgeClass = "title-badge audio-badge mono"; typeBadgeLabel = "AUDIO LOG"; }
            else if (log.type === 'image') { typeBadgeClass = "title-badge mono border border-blue-800 bg-blue-900/30 text-blue-400"; typeBadgeLabel = "IMAGE ATTACHMENT"; }
            else if (log.type === 'memo') { typeBadgeClass = "title-badge mono border border-yellow-800 bg-yellow-900/30 text-yellow-400"; typeBadgeLabel = "INTEROFFICE MEMO"; }
            else if (log.type === 'order') { typeBadgeClass = "title-badge mono border border-teal-800 bg-teal-900/30 text-teal-400"; typeBadgeLabel = "MCM ORDER FORM"; }
            
            const typeBadge = \`<span class="\${typeBadgeClass}">\${typeBadgeLabel}</span>\`;
            
            const titleDisplay = (log.type === 'audio' || log.type === 'image' || log.type === 'memo' || log.type === 'order') ? \`<h2 class="text-lg font-bold text-white mono leading-tight mb-3">\${displayTitle}</h2>\` : '';

            let rawCopyText = log.content || '';
            let cardBodyHtml = '';
            
            if (log.type === 'audio') {
                const audioPlayerHtml = log.audioUrl ? \`
                    <div class="audio-player-container bg-[#121212] border border-zinc-800 p-3 rounded-lg flex items-center gap-4 mt-4">
                        <button class="play-pause-btn text-purple-400 hover:text-purple-300 transition-colors flex-shrink-0" onclick="toggleAudio(this, 'audio-\${log.id}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <div class="bg-zinc-800 h-2 flex-grow rounded cursor-pointer relative" onclick="seekAudio(event, 'audio-\${log.id}')">
                            <div class="progress-fill bg-purple-500 h-full rounded w-0 pointer-events-none transition-all duration-75"></div>
                        </div>
                        <span class="time-display text-zinc-500 text-xs mono pointer-events-none w-24 text-right flex-shrink-0">0:00 / 0:00</span>
                        <audio id="audio-\${log.id}" src="\${escapeHtml(log.audioUrl)}" ontimeupdate="updateProgress(this)" onloadedmetadata="setDuration(this)" onended="resetPlayer(this)"></audio>
                    </div>
                \` : '';
                cardBodyHtml = \`<div class="content-area text-zinc-400 text-sm flex-grow">\${displayContent}</div>\${audioPlayerHtml}\`;
            } else if (log.type === 'image') {
                const urls = (log.imageUrls || (log.imageUrl ? [log.imageUrl] : [])).filter(u => u.trim() !== '');
                rawCopyText = urls.join('\\n');
                
                if (urls.length === 0) {
                    cardBodyHtml = \`<div class="text-zinc-600 text-sm italic">No image URLs provided.</div>\`;
                } else if (urls.length === 1) {
                    cardBodyHtml = \`
                        <div class="mt-2 relative cursor-pointer group" onclick="openImageModal('\${escapeHtml(urls[0])}')">
                            <img src="\${escapeHtml(urls[0])}" alt="\${escapeHtml(log.title)}" class="w-full h-auto max-h-64 object-contain rounded-lg border border-zinc-800 group-hover:border-blue-500 transition-colors">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg">
                                <span class="text-white text-sm mono flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg> Expand
                                </span>
                            </div>
                        </div>
                    \`;
                } else {
                    const slidesHtml = urls.map((url, i) => \`
                        <div class="w-full shrink-0 relative cursor-pointer group snap-center" onclick="openImageModal('\${escapeHtml(url)}')">
                            <img src="\${escapeHtml(url)}" alt="\${escapeHtml(log.title)} - \${i+1}" class="w-full h-auto max-h-64 object-contain rounded-lg border border-zinc-800 group-hover:border-blue-500 transition-colors">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg">
                                <span class="text-white text-sm mono flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg> Expand
                                </span>
                            </div>
                            <div class="absolute bottom-2 right-2 bg-black/70 text-zinc-300 text-[10px] px-2 py-1 rounded mono shadow backdrop-blur-sm">\${i+1} / \${urls.length}</div>
                        </div>
                    \`).join('');

                    cardBodyHtml = \`
                        <div class="mt-2 relative group">
                            <div class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide pb-2 gap-4" id="carousel-\${log.id}">
                                \${slidesHtml}
                            </div>
                            <button onclick="event.stopPropagation(); document.getElementById('carousel-\${log.id}').scrollBy({left: -document.getElementById('carousel-\${log.id}').clientWidth, behavior: 'smooth'})" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-black/60 text-white border border-zinc-700 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black hover:border-blue-500 z-10 shadow-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </button>
                            <button onclick="event.stopPropagation(); document.getElementById('carousel-\${log.id}').scrollBy({left: document.getElementById('carousel-\${log.id}').clientWidth, behavior: 'smooth'})" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-black/60 text-white border border-zinc-700 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black hover:border-blue-500 z-10 shadow-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                        </div>
                    \`;
                }
            } else if (log.type === 'memo') {
                const memoLines = [];
                if(log.memoDate) memoLines.push('Date: ' + log.memoDate);
                if(log.memoTo) memoLines.push('To: ' + log.memoTo);
                if(log.memoFrom) memoLines.push('From: ' + log.memoFrom);
                if(log.memoCC) memoLines.push('CC: ' + log.memoCC);
                if(log.memoSubject) memoLines.push('Subject: ' + log.memoSubject);
                memoLines.push('');
                if(log.content) memoLines.push(log.content);
                if(log.memoSignature) { memoLines.push(''); memoLines.push(log.memoSignature); }
                rawCopyText = memoLines.join('\\n').trim();

                cardBodyHtml = \`
                    <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 mb-4 text-sm mono text-zinc-300 flex flex-col gap-2 shadow-inner">
                        \${log.memoDate ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">DATE:</span> <span class="leading-relaxed">\${formatText(escapeHtml(log.memoDate))}</span></div>\` : ''}
                        \${log.memoTo ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">TO:</span> <span class="leading-relaxed">\${formatText(escapeHtml(log.memoTo))}</span></div>\` : ''}
                        \${log.memoFrom ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">FROM:</span> <span class="leading-relaxed">\${formatText(escapeHtml(log.memoFrom))}</span></div>\` : ''}
                        \${log.memoCC ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">CC:</span> <span class="leading-relaxed">\${formatText(escapeHtml(log.memoCC))}</span></div>\` : ''}
                        \${log.memoSubject ? \`<div class="mt-1 pt-3 border-t border-zinc-800 flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">SUBJECT:</span> <span class="leading-relaxed">\${formatText(escapeHtml(log.memoSubject))}</span></div>\` : ''}
                    </div>
                    <div class="content-area text-zinc-300 text-sm flex-grow">\${displayContent}</div>
                    \${log.memoSignature ? \`<div class="mt-6 pt-4 border-t border-zinc-800/50 text-zinc-400 font-serif italic text-lg">\${formatText(escapeHtml(log.memoSignature))}</div>\` : ''}
                \`;
            } else if (log.type === 'order') {
                const orderLines = [];
                if(log.orderDate) orderLines.push('ORDER DATE: ' + log.orderDate);
                if(log.orderPickup) orderLines.push('PICKUP DATE: ' + log.orderPickup);
                if(log.orderName) orderLines.push("PURCHASER'S NAME: " + log.orderName);
                if(log.orderDate || log.orderPickup || log.orderName) orderLines.push('');
                if(log.orderBody) orderLines.push('BODY TYPE: ' + log.orderBody);
                if(log.orderQty) orderLines.push('QUANTITY: ' + log.orderQty);
                if(log.orderMaterials) orderLines.push('REQUESTED MATERIALS: ' + log.orderMaterials);
                if(log.orderDetails) orderLines.push('REQUESTED DETAILS: ' + log.orderDetails);
                if(log.orderBody || log.orderQty || log.orderMaterials || log.orderDetails) orderLines.push('');
                if(log.orderSpecial) orderLines.push('SPECIAL FUNCTIONS(2X ORIGINAL FEE): ' + log.orderSpecial);
                rawCopyText = orderLines.join('\\n').trim();

                cardBodyHtml = \`
                    <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mono text-zinc-300 flex flex-col gap-2 shadow-inner">
                        \${log.orderDate ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">ORDER DATE:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderDate))}</span></div>\` : ''}
                        \${log.orderPickup ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">PICKUP DATE:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderPickup))}</span></div>\` : ''}
                        \${log.orderName ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">PURCHASER'S NAME:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderName))}</span></div>\` : ''}
                        \${(log.orderDate || log.orderPickup || log.orderName) && (log.orderBody || log.orderQty || log.orderMaterials || log.orderDetails) ? \`<div class="my-1 border-t border-zinc-800/50"></div>\` : ''}
                        \${log.orderBody ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">BODY TYPE:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderBody))}</span></div>\` : ''}
                        \${log.orderQty ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">QUANTITY:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderQty))}</span></div>\` : ''}
                        \${log.orderMaterials ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">REQUESTED MATERIALS:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderMaterials))}</span></div>\` : ''}
                        \${log.orderDetails ? \`<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">REQUESTED DETAILS:</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderDetails))}</span></div>\` : ''}
                        \${log.orderSpecial ? \`<div class="mt-1 pt-3 border-t border-zinc-800"><span class="text-zinc-500 font-bold block mb-1">SPECIAL FUNCTIONS(2X ORIGINAL FEE):</span> <span class="leading-relaxed break-words">\${formatText(escapeHtml(log.orderSpecial))}</span></div>\` : ''}
                    </div>
                \`;
            } else {
                cardBodyHtml = \`<div class="content-area text-zinc-400 text-sm flex-grow">\${displayContent}</div>\`;
            }

            const encodedCopyText = encodeURIComponent(rawCopyText).replace(/'/g, "%27");

            div.innerHTML = \`
                <div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2 items-center flex-wrap">
                        \${typeBadge}
                        \${locHtml}
                    </div>
                    <button class="copy-btn" title="Copy Content" onclick="copyContent(this, '\${encodedCopyText}')">\${copySvg}</button>
                </div>
                \${titleDisplay}
                <div class="content-wrapper flex flex-col">
                    \${cardBodyHtml}
                </div>
            \`;
            return div;
        }

        function copyContent(btn, encodedText) {
            const textarea = document.createElement('textarea');
            textarea.value = decodeURIComponent(encodedText);
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const originalHTML = btn.innerHTML;
            btn.innerHTML = \`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>\`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1500);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; render(); });
        document.getElementById('filterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                render();
            }
        });
        document.getElementById('subFilterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-btn')) {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.dataset.type;
                render();
            }
        });
        
        // Start execution
        init();
    ${scriptEnd}
</body>
</html>`; // CLOSE TEMPLATE

                // 3. Download generated HTML
                const htmlBlob = new Blob([template], { type: 'text/html' });
                const htmlDownloadUrl = URL.createObjectURL(htmlBlob);
                const aHtml = document.createElement('a');
                aHtml.href = htmlDownloadUrl;
                aHtml.download = `${exportData.header.replace(/\s+/g, '_').toLowerCase()}.html`;
                
                // Slight delay to prevent browser from blocking multiple file downloads
                setTimeout(() => {
                    document.body.appendChild(aHtml);
                    aHtml.click();
                    document.body.removeChild(aHtml);
                    URL.revokeObjectURL(htmlDownloadUrl);
                }, 500);
            }
        }
    </script>
</body>
