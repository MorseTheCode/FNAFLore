        .content-wrapper { border-top: 1px solid #333; padding-top: 0.75rem; margin-top: 0; flex-grow: 1; }

    <script id="archive-data" type="application/json">{"header":"FNAF_PHONE_CALLS","subtitle":"Audio Captures: Documenting Night Guard Instructions","categories":[{"id":"fnaf1","label":"FNAF 1"},{"id":"fnaf2","label":"FNAF 2"},{"id":"fnaf3","label":"FNAF 3"}],"logs":[{"id":"f1_1","title":"Night 1","location":"FNAF 1","content":"Hello? Hello hello?Uh, I wanted to record a message for you, to help you get settled in on your first night. Um, I actually worked in that office before you, I’m finishing up my last week now as a matter of fact. So, I know it can be a bit overwhelming, but I’m here to tell you there’s nothing to worry about, Uh, you’ll do fine. So, let’s just focus on getting you through your first week, okay?\n\nUh, let’s see, first there’s an introductory greeting from the company, that I’m supposed to read. Uh, it’s kind of a legal thing, you know.\n\nUm, \"Welcome to Freddy Fazbear’s Pizza, a magical place for kids and grown-ups alike, where fantasy and fun come to life. Fazbear Entertainment is not responsible for damage to property or person. Upon discovering that damage or death has occurred, a missing person report will be filed within 90 days, or as soon property and premises have been thoroughly cleaned and bleached, and the carpets have been replaced.\" Blah blah blah.\n\nNow that might sound bad, I know. But, there’s really nothing to worry about.\n\nUh, the animatronic characters here, do get a bit quirky at night, but do I blame them? No. If I were forced to sing those same stupid songs for twenty years and I never got a bath? I’d probably be a bit irritable at night too. So, remember, these characters hold a special place in the hearts of children and we need to show them a little respect, right? Okay.\n\nSo, just be aware, the characters do tend to wander a bit. Uh, they’re left in some kind of free roaming mode at night, uh, something about their servos locking up if they get turned off for too long? Uh, they used to be allowed to walk around during the day too, but then there was The Bite of ’87. Yeah. I-It’s amazing that the human body can live without the frontal lobe, you know?\n\nUh, now concerning your safety. The only real risk to you as a night watchman here, if any, is the fact that these characters, uh, if they happen to see you after hours probably won’t recognize you as a person. They’ll pr-They’ll most likely see you as a metal endoskeleton without its costume on. Now, since that’s against the rules here at Freddy Fazbear’s Pizza, they’ll probably try to…forcefully stuff you inside a Freddy Fazbear suit. Um, now, that wouldn’t be so bad, if the suits themselves weren’t filled with crossbeams, wires, and animatronic devices. Especially around the facial area. So you could imagine how having your head forcefully pressed inside one of those could cause a bit of discomfort, and death. Uh, the only parts of you that would likely see the light of day again would be your eyeballs and teeth when they pop out the front of the mask. Heh. Yeah, they don’t tell you these things when you sign up.\n\nBut hey, first day should be a breeze. I’ll chat with you tomorrow. Uh, check those cameras, and remember to close the doors only if absolutely necessary. Gotta conserve power. Alright, good night.","isAudio":true,"audioUrl":"./audios/fnaf1/1.ogg","tags":["fnaf1"],"type":"audio","imageUrls":[""]},{"id":"f1_2","title":"Night 2","location":"FNAF 1","content":"Uhh, Hello? Hello?Uh, well, if you’re hearing this and you made it to day two, uh, congrats! I-I won’t talk quite as long this time, since Freddy and his friends tend to become more active as the week progresses. Uh, it might be a good idea to peek at those cameras while I talk, just to make sure everyone’s in their proper place. You know. Uh, interestingly enough, Freddy himself doesn’t come off stage very often. I heard he becomes a lot more active in the dark though, so, hey, I guess that’s one more reason not to run out of power, right?\n\nI-I also want to emphasize the importance of using your door lights. Uh, there are blind spots in your camera views, and those blind spots happen to be right outside your doors. So if you can’t find something – or someone – on your cameras, be sure to check the door lights. Uh, you might only have a few seconds to react. Uh, not that you would be in any danger, of course. I’m not implying that.\n\nAlso, check on the curtain in Pirate Cove from time to time. The character in there seems unique in that, he becomes more active if the cameras remain off for long periods of time. I guess he doesn’t like being watched. I don’t know.\n\nUh, anyway, I’m sure you have everything under control! Uh, talk to you soon!","isAudio":true,"audioUrl":"./audios/fnaf1/2.ogg","tags":["fnaf1"],"type":"audio","imageUrls":[""]},{"id":"f1_3","title":"Night 3","location":"FNAF 1","content":"Hello, hello?Hey you’re doing great! Most people don’t last this long! I mean, you know, they usually move on to other things by now. I’m not implying that they died. Th-th-that’s not what I meant.\n\nUh, anyway, I better not take up too much of your time. Things start getting real tonight.\n\nUh, Hey, listen. I had an idea. If you happen to get caught and want to avoid getting stuffed into a Freddy suit, uh, try playing dead! You know, go limp. Then there’s a chance that, uh, maybe they’ll think that you’re an empty costume instead. Then again if they think you’re an empty costume, they might try to, stuff a metal skeleton into you. I wonder how that would work.\n\nY-Yeah, never mind, scratch that. I-It’s best just, not to get caught.\n\nUh, ok, I’ll leave you to it. See you on the flip side!","isAudio":true,"audioUrl":"./audios/fnaf1/3.ogg","tags":["fnaf1"],"type":"audio","imageUrls":[""]},{"id":"f1_4","title":"Night 4","location":"FNAF 1","content":"Hello hello?Hey! Hey, wow, day four. I knew you could do it.\n\nUh, hey, listen, I may not be around to send you a message tomorrow. *door bangs are heard here, and continue throughout the call* It’s-It’s been a bad night here for me. Um, I-I’m kinda glad that I recorded my messages for you *clears throat* uh, when I did.\n\nUh, hey, do me a favour. Maybe sometime, uh, you could check inside those suits in the back room? I’m gonna try to hold out until someone checks. Maybe it won’t be so bad. Uh, I-I-I-I always wondered what was in all those empty heads, back there.\n\n*Freddy’s “Toreador March” music plays*\n\nYou know…*animatronic moan is heard, the same as when you have your monitor up, and an animatronic has got into the room*\n\nOh, no – *garbled scream that more closely resembles Golden Freddy’s scream, followed by static*","isAudio":true,"audioUrl":"./audios/fnaf1/4.ogg","tags":["fnaf1"],"type":"audio","imageUrls":[""]},{"id":"f1_5","title":"Night 5","location":"FNAF 1","content":"With this phone call, it is important to note that Phone Guy does not actually speak. Instead, a garbled voice speaks that is assumed to be animatronic.\nWhen the phone call is reversed and touched up, words can be heard against a backdrop of garbled interference. While it is nearly unrecognizable, the call is actually a reading of an excerpt from a book named \"Autobiography of a Yogi\" by a writer called \"Paramhansa Yogananda\". \n\n\"Sir, it is lamentable that mass agricultural development is not speeded by fuller use of your marvelous mechanisms.\nWould it not be easily possible to employ some of them in quick laboratory experiments to indicate the influence of various types of fertilizers on plant growth?\nYou are right.\nCountless uses of Bose instruments will be made by future generations.\nThe scientist seldom knows contemporaneous reward;\nit is enough to possess the joy of creative service.\"\n–Autobiography of a Yogi by Paramhansa Yogananda\n-Chapter 8\n-Paragraph 36","isAudio":true,"audioUrl":"./audios/fnaf1/5.ogg","tags":["fnaf1"],"type":"audio","imageUrls":[""]},{"id":"f2_1","title":"Night 1","location":"FNAF 2","content":"Uh, hello? Hello, hello?Uh, hello and welcome to your new summer job at the new and improved Freddy Fazbear’s Pizza. Uh, I’m here to talk you through some of the things you can expect to see during your first week here, and to help you get started down this new and exciting career path.\n\nUh, now, I want you to forget anything you may have heard about the old location. You know, uh, some people still have a somewhat negative impression of the company. Uh, that old restaurant was kind of left to rot for quite a while, but, I want to reassure you, Fazbear Entertainment is committed to family fun and above all, safety. They’ve spent a small fortune on these new animatronics, uh, facial recognition, advanced mobility. They even let them walk around during the day! Isn’t that neat? *clears throat* But most importantly, they’re all tied into some kind of criminal database, so they can detect a predator a mile away. Heck, we should be paying them to guard you!\n\nUh, now that being said, no new system is without its… kinks. Uh, you’re only the second guard to work at that location. Uh, the first guy finished his week, but complained about… conditions. Uh, we switched him over to the day shift. So hey, lucky you, right? Uh mainly he expressed concern that certain characters seemed to move around at night, and even attempted to get into his office. Now, from what we know, that should be impossible. Uh, that restaurant should be the safest place on earth. So, while our engineers don’t really have an explanation for this, the working theory is that… the robots were never given a proper “night mode”. So when it gets quiet, they think they’re in the wrong room, so then they go try to find where the people are, and in this case, that’s your office.\n\nSo our temporary solution is this. There’s a music box over by the Prize Counter, and it’s rigged to be wound up remotely. So just, every once in a while, switch over to the Prize Counter video feed and wind it up for a few seconds. It doesn’t seem to affect all of the animatronics, but it does affect… one of them. *clears throat*\n\nUh, and as for the rest of them, we have an even easier solution. You see, there may be a minor glitch in the system, something about robots seeing you as an endoskeleton without his costume on, and wanting to stuff you in a suit, so hey, we’ve given you an empty Freddy Fazbear head. Problem solved! You can put it on anytime, and leave it on for as long as you want. Eventually anything that wandered in, will wander back out.\n\nUh, something else worth mentioning is kind of the modern design of the building. You may have noticed there are no doors for you to close, heh.\n\nBut hey, you have a light! And even though your flashlight can run out of power, the building cannot. So, don’t worry about the place going dark.\n\nWell, I think that’s it. Uh, you should be golden. Uh, check the lights, put on the Freddy head if you need to, uh, keep the music box wound up, piece of cake. Have a good night, and I’ll talk to you tomorrow.","isAudio":true,"audioUrl":"./audios/fnaf2/1.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f2_2","title":"Night 2","location":"FNAF 2","content":"Uh, hello? Hello! Uh, see, I told you your first night wouldn’t be a problem, You’re a natural! Uh, by now I’m sure you’ve noticed the older models, sitting in the back room. Uh, those are from the previous location, we just use them for parts now. The idea at first was to repair them. Uh, they even started retrofitting them with some of the newer technology. But they were just so ugly, you know? And the smell…ugh. Uh, so the company decided to go in a whole new direction, and make them super kid-friendly. Uh, those older ones shouldn’t be able to walk around, but if they do, the whole Freddy head trick should work on them too, sooo, whatever.Uh, heh. I loved those old characters. Uh, did you ever see Foxy the pirate? Oh wait, Foxy…oh yeah, Foxy! Uh…hey listen! Uh, that one was always a bit twitchy. Uh, I’m not sure the Freddy head trick will work on Foxy. Uh, if for some reason he activates during the night, and you see him standing at the far end of the hall, just flash your light at him from time to time. Those older models would always get disoriented with bright lights. It would cause a system restart, or something. Uh, come to think of it, you might want to try that on any room where something undesirable might be. It might hold them in place for a few seconds. Uh, that glitch might have carried over to the newer models too.\n\nOne more thing, don’t forget the music box! I’ll be honest, I never liked that puppet thing. It’s always…thinking, and it can go anywhere. I don’t think the Freddy mask will fool it. So, just, don’t forget the music box.\n\nUm, anyway, I’m sure it won’t be a problem. Uh, have a good night, and talk to you tomorrow.","isAudio":true,"audioUrl":"./audios/fnaf2/2.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f2_3","title":"Night 3","location":"FNAF 2","content":"Uh, hello hello! See, I told you you wouldn’t have any problems! Did, uh, Foxy ever appear in the hallway? Probably not, I was just curious. Like I said, he was always my favourite.They tried to remake Foxy, ya know? Uh, they thought the first one was too scary, so they redesigned him to be more kid-friendly and put him in Kid’s Cove. To keep the toddlers entertained, you know. But kids these days just can’t keep their hands to themselves. The staff literally has to put Foxy back together after every shift. So eventually they stopped trying and left him as some “take apart and put back together” attraction. Now he’s just a mess of parts. I think the employees refer to him as just “The Mangle.”\n\nUh… oh hey! Before I go, uh, I wanted to ease your mind about any rumours you might have heard lately. You know how these local stories come and go and seldom mean anything. I can personally assure you, that whatever is going on out there, however tragic it may be, has nothing to do with our establishment. It’s just all rumour and speculation, People trying to make a buck, you know. Uh, our guard during the day has reported nothing unusual, and he’s on watch from opening ’til close.\n\nOkay, well anyway, hang in there and I’ll talk with you tomorrow.","isAudio":true,"audioUrl":"./audios/fnaf2/3.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f2_4","title":"Night 4","location":"FNAF 2","content":"Hello hello! Uh, hey there, night four! I told you you’d get the hang of it!Ok, so uh, just to update you, uh, there’s been somewhat of an investigation going on. Uh, we may end up having to close for a few days, I don’t know. Uh, I want to emphasize though that it’s really just a precaution. Uh, Fazbear Entertainment denies any wrongdoing. These things happen sometimes. Um, it’ll all get sorted out in a few days. Just keep an eye on things and I’ll keep you posted.\n\nUh, just as a side note though, try to avoid eye contact with any of the animatronics tonight if you can. Someone may have tampered with their facial recognition systems, we’re not sure. But the characters have been acting very unusual, almost aggressive towards the staff. They interact with the kids just fine, but when they encounter an adult, they just…stare.\n\nUh, anyways, hang tight, it’ll all pass. Good night!","isAudio":true,"audioUrl":"./audios/fnaf2/4.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f2_5","title":"Night 5","location":"FNAF 2","content":"Hello hello! Hey, good job, night 5!Um, hey, err, keep a close eye on things tonight, ok? Um, from what I understand the building is on lockdown, uh…no one is allowed in or out, y’know. Especially concerning any…previous employees.\n\nUm, when we get it all sorted out we may move you to the day shift. A position just became…available. Uh, we don’t have a replacement for your shift yet but we’re working on it. Uh, we’re going to try to contact the original restaurant owner. Uh, I think the name of the place was…”Fredbear’s Family Diner” or something like that. It was closed for years though, I doubt we’ll be able to track anybody down.\n\nUh, so just get through one more night! Uh, hang in there! Goodnight!","isAudio":true,"audioUrl":"./audios/fnaf2/5.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f2_6","title":"Night 6","location":"FNAF 2","content":"Uh, hello hello! Uh, what on earth are you doing there? Uh didn’t you get the memo? Uh, the place is closed down, a-at least for a while. Someone used one of the suits. We had a spare in the back, a yellow one. Someone used it…now none of them are acting right.Listen j-just finish your shift, it’s safer than trying to leave in the middle of the night. Uh, we have one more event scheduled for tomorrow, a birthday. You’ll be on day shift. Wear your uniform, stay close to the animatronics and make sure they don’t hurt anyone okay? Uh for now just make it through the night. Uh, when the place eventually opens again I’ll probably take the night shift myself.\n\nOkay, good night, and good luck.","isAudio":true,"audioUrl":"./audios/fnaf2/6.ogg","tags":["fnaf2"],"type":"audio","imageUrls":[""]},{"id":"f3_1","title":"Night 1","location":"FNAF 3","content":"Hey hey, glad you came back for another night! I promise, it’ll be a lot more interesting this time! We found some, some great new relics over the weekend, and we’re out tracking down a new lead, right now! So, uhhh, lemme just update you real quick, then you can get to work. Like, the attraction opens in like, a week, so we have to make sure everything works, and nothing catches on fire!Uh, when the place opens, people will come in at the opposite end of the building, and work their way toward you, then past you and out the exit. Uh, yeah you’ve officially become part of the attraction. Uh, you’ll be starring as…the security guard! So not only will you be monitoring the people on the camera as they pass through – you know, to make sure no one steals anything or makes out in the corner – but you’ll also be a part of the show. It’ll make it feel really authentic, I think.\n\nUh, now lemme tell you about what’s new. We found another set of drawings, always nice, and a Foxy head! Which we think could be authentic! Then again, it might just be another crappy cosplay. And we found a desk fan. Very old-school. Metal though. Watch the fingers, uh, ha.\n\nUh, right now the place is basically just, you know, flashing lights and spooky props. Uh, honestly thought we’d have more by now. Uh, if we don’t have something really cool by next week, we may have to suit you up in a furry suit and make you walk around saying “boo!”. Heh-heh.\n\nUh, but you know, like I said, we’re trying to track down a good lead right now. Uh, some guy who helped design one of the buildings says there was like an extra room that got boarded up, or, uh, something like that. So we’re gonna take a peek and see what we can find. Uh, for now just get comfortable with the new set up.\n\nUmm, you can check the security cameras over to your right with a click of that blue button. Uh, you can toggle between the hall cams and the vent cam. Uh, then over to your far left, uh, you can flip up your maintenance panel. You know, use this to reboot any systems that may go offline. Uh-heh. Uh in trying to make the place feel vintage we may have overdone it a bit, heh-heh. Some of this equipment is barely functional. Yeah, I-I wasn’t joking about the fire that’s-that’s-that’s a real risk. Uh, the most important thing you want to watch for is the ventilation.\n\nLook, this place will give you the spooks, man, and if you let that ventilation go offline then you’ll start seeing some crazy stuff, man. Keep that air flowing! Okay, keep an eye on things, and we’ll try to have something new for you tomorrow night!","isAudio":true,"audioUrl":"./audios/fnaf3/1.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]},{"id":"f3_2","title":"Night 2","location":"FNAF 3","content":"Hey man, okay, I have some awesome news for you! First of all, we found some vintage audio training cassettes. Dude, these are like pre-historic! I think they were, like, training tapes for, like, other employees or something like that. So I thought we could, like, have them playing, like, over the speakers as people walk through the attraction. Dude, that’d make this feel, legit man. But I have an even better surprise for you, and you’re not gonna believe this! We found one. A real one.Uh-uh-uh, gotta go man. uh, we-well look, it-it’s in there somewhere, I’m-I’m sure you’ll see it. Okay, I’ll leave you with some of this great audio that I found. Talk to you later man!\n\n–PHONE GUY SPEAKS–\nUh, hello? Hello hello? Uh welcome to your new career as a performer slash entertainer for Freddy Fazbear’s Pizza. Uh, these tapes will provide you with much needed information on how to handle, slash climb into, slash climb out of, mascot costumes. Right now we have two specially designed suits that double as both animatronic and suit. So please pay close attention while learning how to operate these suits, as accidents, slash injury, slash death, slash irreparable and grotesque maiming, can occur.\n\nFirst, we will discuss how to operate the mascots when they are in animatronic form. For ease of operation the animatronics, are set to turn and walk towards sound cues. This is an easy and hands-free approach, to making sure the animatronics stay where the children are, for maximum entertainment slash crowd-pleasing value. To change the animatronics to suit mode, insert and turn firmly the hand crank provided by the manufacturer.\n\nTurning the crank will recoil and compress the animatronic parts around the sides of the suit, providing room to climb inside. Please make sure the springlocks are fastened tight, to ensure the animatronic devices remain fixed. We will cover this in more detail in tomorrow’s session.\n\nRemember to smile. You are the face of Freddy Fazbear’s Pizza.","isAudio":true,"audioUrl":"./audios/fnaf3/2.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]},{"id":"f3_3","title":"Night 3","location":"FNAF 3","content":"Uh, hello hello! Uh, for today’s lesson we will be continuing our training on proper suit handling technique.When using an animatronic as a suit, please ensure that the animatronic parts are tightly compressed and fastened by the springlocks located around the inside of the suit. It may take a few moments, to position your head and torso between these parts in a manner where you can move and speak. Try not to nudge or press against any of the springlocks inside the suit. Do not touch the springlocks at any time. Do not breathe on the springlocks, as moisture may loosen them, and cause them to break loose. In the case that the springlocks come loose while you are wearing the suit, please try to manoeuvrer away from populated areas before bleeding out, as not to ruin the customer experience.\n\nAs always if there is ever an emergency, please note there’s a designated safe room. Every location is built with one extra room that is not included in the digital map layout programmed in the animatronics or security systems. This room is hidden to customers, invisible to animatronics, and is always off-camera.\n\nAs always, remember to smile. You are the face of Freddy Fazbear’s Pizza.","isAudio":true,"audioUrl":"./audios/fnaf3/3.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]},{"id":"f3_4","title":"Night 4","location":"FNAF 3","content":"Uh hello? Hello hello? Uh there’s been a slight change of company policy concerning the use of the suits. Umm, don’t. After learning of an unfortunate incident at the sister location involving multiple and simultaneous springlock failures, the company has deemed the suits temporarily unfit for employees. Safety is top priority at Freddy Fazbear’s Pizza, which is why the classic suits are being retired to an appropriate location while being looked at by our technicians.Until replacements arrive, you will be expected to wear the temporary costumes provided to you. Keep in mind that they were found on very short notice, so questions about appropriateness slash relevance should be deflected. I repeat, the classic suits are not to be touched, activated, or worn. That being said we are free of liability, do as you wish.\n\nAs always, remember to smile. You are the face of Freddy Fazbear’s Pizza.","isAudio":true,"audioUrl":"./audios/fnaf3/4.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]},{"id":"f3_5","title":"Night 5","location":"FNAF 3","content":"Hello, hello? Umm, this is just a reminder of company policy concerning the safe room.The safe room is reserved for equipment and or other properties not being currently used, and as a back-up safety location for employees only. This is not a break room, it should not be considered a place for employees to hide and or congregate. And under no circumstance should a customer ever, be taken into this room, and out of the main show area. Management has also been made aware that the Spring Bonnie animatronic has been noticeably moved, and would like to remind employees that this costume is not safe to wear under any circumstances.\n\nThank you, and remember to smile.You are the face of Freddy Fazbear’s Pizza.","isAudio":true,"audioUrl":"./audios/fnaf3/5.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]},{"id":"f3_6","title":"Night 6","location":"FNAF 3","content":"Uh hello, hello? Uh, this is just to inform all employees, that due to budget restrictions the previously mentioned safe rooms are being sealed at most locations. Including this one. Work crews will be here most of the day today constructing a false wall over the old door face. Nothing is being taken out beforehand, so if you left anything inside, then it’s your own fault. Management also requests that this room not be mentioned to family, friends, or insurance representatives.Thanks again, and remember to smile. You are the face of Freddy Fazbear’s Pizza.","isAudio":true,"audioUrl":"./audios/fnaf3/6.ogg","tags":["fnaf3"],"type":"audio","imageUrls":[""]}],"_lastModified":1779000857964}</script>
    <script>
        const jsonSourceUrl = "classic.json";
        let appData = { header: "", subtitle: "", categories: [], logs: [] };
        
        let currentCategory = 'all';
        let currentType = 'all';
        let currentSearch = '';

        async function init() {
            const absoluteUrl = new URL(jsonSourceUrl, window.location.href).href;
            const cacheKey = 'mcm_archive_cache_' + absoluteUrl.replace(/[^a-zA-Z0-9]/g, '_');
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                try {
                    appData = JSON.parse(cached);
                    populateUI();
                    render();
                    setTimeout(() => { updateArrows('filterBar'); }, 100);
                } catch(e) {}
            }

            try {
                const response = await fetch(jsonSourceUrl + '?t=' + Date.now(), { cache: 'no-store' });
                if(!response.ok) throw new Error("Network response was not ok");
                const serverData = await response.json();
                
                appData = serverData;
                localStorage.setItem(cacheKey, JSON.stringify(appData));
                populateUI();
                render();
                setTimeout(() => { updateArrows('filterBar'); }, 100);
            } catch (error) {
                console.error("Failed to load archive data:", error);
                if (!cached) {
                    document.getElementById('page-title').textContent = "CONNECTION ERROR";
                    document.getElementById('page-subtitle').textContent = "Failed to retrieve databank. Make sure content json is accessible.";
                }
            }
        }

        function populateUI() {
            document.getElementById('page-title').textContent = appData.header;
            document.getElementById('page-subtitle').textContent = appData.subtitle;
            document.title = appData.header;
            
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = '<button class="category-btn active shrink-0" data-cat="all">All Logs</button>' + 
                appData.categories.map(c => `<button class="category-btn shrink-0" data-cat="${escapeHtml(c.id)}">${escapeHtml(c.label)}</button>`).join('');
            
            appData.logs.forEach(l => {
                l.type = l.type || (l.isAudio ? 'audio' : 'text');
                l.tags = l.tags || [];
                if (l.imageUrl && !l.imageUrls) l.imageUrls = [l.imageUrl];
                if (!l.imageUrls) l.imageUrls = [""];
            });
        }

        function escapeRegExp(string) { return string.replace(/[.*+?^\$\{\}()|\[\]\\]/g, '\\$&'); }
        function escapeHtml(unsafe) {
            return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        function formatText(s) {
            if (!s) return '';
            s = s.replace(/~~(.*?)~~/g, '<del class="opacity-70 text-red-400 decoration-red-500">$1</del>');
            s = s.replace(/\(\((.*?)\)\)/g, '<span class="inline-block align-middle whitespace-nowrap border border-red-500/70 text-red-400 px-2 py-0.5 leading-none mx-0.5 text-center" style="border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;">$1</span>');
            return s;
        }

        // --- Image Modal Logic ---
        function openImageModal(url) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImage').src = url;
            document.getElementById('modalDownloadBtn').href = url;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }
        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('modalImage').src = '';
            }, 300);
        }

        // --- Audio Player Logic ---
        function toggleAudio(btn, audioId) {
            var audio = document.getElementById(audioId);
            if (audio.paused) {
                document.querySelectorAll('audio').forEach(function(a) { 
                    if(a !== audio) { 
                        a.pause(); 
                        var container = a.closest('.audio-player-container');
                        if (container) {
                            var b = container.querySelector('.play-pause-btn');
                            if(b) b.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                        }
                    }
                });
                audio.play();
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
            } else {
                audio.pause();
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            }
        }
        function updateProgress(audio) {
            var container = audio.closest('.audio-player-container');
            var fill = container.querySelector('.progress-fill');
            var timeDisplay = container.querySelector('.time-display');
            var percent = (audio.currentTime / audio.duration) * 100 || 0;
            fill.style.width = percent + '%';
            timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration || 0);
        }
        function setDuration(audio) {
            var container = audio.closest('.audio-player-container');
            var timeDisplay = container.querySelector('.time-display');
            timeDisplay.textContent = '0:00 / ' + formatTime(audio.duration);
        }
        function resetPlayer(audio) {
            var container = audio.closest('.audio-player-container');
            var btn = container.querySelector('.play-pause-btn');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            var fill = container.querySelector('.progress-fill');
            fill.style.width = '0%';
            var timeDisplay = container.querySelector('.time-display');
            timeDisplay.textContent = '0:00 / ' + formatTime(audio.duration || 0);
        }
        
        let isScrubbing = false;
        let currentScrubAudio = null;
        let currentScrubBar = null;

        function startScrub(e, audioId) {
            isScrubbing = true;
            currentScrubAudio = document.getElementById(audioId);
            currentScrubBar = e.currentTarget;
            doScrub(e);
        }

        function doScrub(e) {
            if (!isScrubbing || !currentScrubAudio || !currentScrubBar) return;
            const rect = currentScrubBar.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            clickX = Math.max(0, Math.min(clickX, rect.width));
            const percent = clickX / rect.width;
            currentScrubAudio.currentTime = percent * currentScrubAudio.duration;
        }

        function stopScrub() {
            isScrubbing = false;
            currentScrubAudio = null;
            currentScrubBar = null;
        }

        document.addEventListener('mousemove', doScrub);
        document.addEventListener('mouseup', stopScrub);

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function getGroupedLogs(logs) {
            const groups = appData.categories.map(cat => ({
                name: cat.label,
                match: (l) => (l.tags || []).includes(cat.id)
            }));
            
            groups.push({ name: "Uncategorized Archives", match: (l) => !l.tags || l.tags.length === 0 });

            const result = [];
            const processedIds = new Set();

            groups.forEach(group => {
                const groupLogs = logs.filter(l => !processedIds.has(l.id) && group.match(l));
                if (groupLogs.length > 0) {
                    result.push({ title: group.name, logs: groupLogs });
                    groupLogs.forEach(l => processedIds.add(l.id));
                }
            });
            return result;
        }

        function scrollContainer(id, amount) {
            document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' });
        }

        function updateArrows(id) {
            const container = document.getElementById(id);
            if (!container) return;
            const wrapper = container.parentElement;
            const leftArrow = wrapper.querySelector('.left-arrow');
            const rightArrow = wrapper.querySelector('.right-arrow');
            
            if (leftArrow && rightArrow) {
                if (container.scrollLeft > 0) {
                    leftArrow.classList.remove('hidden');
                } else {
                    leftArrow.classList.add('hidden');
                }
                
                if (container.scrollLeft < container.scrollWidth - container.clientWidth - 2) {
                    rightArrow.classList.remove('hidden');
                } else {
                    rightArrow.classList.add('hidden');
                }
            }
        }

        window.addEventListener('resize', () => {
            updateArrows('filterBar');
            if (!document.getElementById('subFilterWrapper').classList.contains('hidden')) {
                updateArrows('subFilterBar');
            }
        });

        function render() {
            const display = document.getElementById('logDisplay');
            display.innerHTML = '';

            const subFilterWrapper = document.getElementById('subFilterWrapper');
            if (['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) {
                subFilterWrapper.classList.add('hidden');
                subFilterWrapper.classList.remove('flex');
                currentType = 'all';
                document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === 'all'));
            } else {
                subFilterWrapper.classList.remove('hidden');
                subFilterWrapper.classList.add('flex');
                setTimeout(() => updateArrows('subFilterBar'), 10);
            }

            let filtered = appData.logs.filter(log => {
                const searchLower = currentSearch.toLowerCase();
                const matchesSearch = (log.title || '').toLowerCase().includes(searchLower) || 
                                      (log.content || '').toLowerCase().includes(searchLower) ||
                                      (log.location || '').toLowerCase().includes(searchLower);
                
                let matchesCat = currentCategory === 'all';
                if (!matchesCat) {
                    if (['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) {
                        matchesCat = log.type === currentCategory;
                    } else {
                        matchesCat = (log.tags || []).includes(currentCategory);
                    }
                }
                
                const matchesType = currentType === 'all' ? true : log.type === currentType;

                return matchesSearch && matchesCat && matchesType;
            });

            document.getElementById('logCount').innerText = filtered.length;

            let cols = parseInt(document.getElementById('colSlider').value);
            document.getElementById('colValue').textContent = cols;
            let gridClass = 'grid gap-6';
            if (cols === 1) gridClass += ' grid-cols-1';
            else if (cols === 2) gridClass += ' grid-cols-1 md:grid-cols-2';
            else if (cols === 3) gridClass += ' grid-cols-1 md:grid-cols-2 lg:grid-cols-3';
            else if (cols === 4) gridClass += ' grid-cols-1 md:grid-cols-2 lg:grid-cols-4';
            else if (cols === 5) gridClass += ' grid-cols-1 md:grid-cols-3 lg:grid-cols-5';

            if ((currentCategory === 'all' || ['text', 'audio', 'image', 'memo', 'order'].includes(currentCategory)) && !currentSearch) {
                const grouped = getGroupedLogs(filtered);
                grouped.forEach(group => {
                    const groupSection = document.createElement('div');
                    groupSection.className = 'context-group';
                    groupSection.innerHTML = `<div class="group-header mono">${escapeHtml(group.title)}</div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = gridClass;
                    
                    group.logs.forEach(log => grid.appendChild(createCard(log)));
                    groupSection.appendChild(grid);
                    display.appendChild(groupSection);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = gridClass;
                filtered.forEach(log => grid.appendChild(createCard(log)));
                display.appendChild(grid);
            }
        }

        function createCard(log) {
            const div = document.createElement('div');
            div.className = 'log-card p-5 rounded-xl flex flex-col gap-3';
            
            let displayTitle = escapeHtml(log.title);
            let displayContent = escapeHtml(log.content);
            if (currentSearch) {
                const regex = new RegExp(`(${escapeRegExp(currentSearch)})`, 'gi');
                displayTitle = displayTitle.replace(regex, '<span class="highlight">$1</span>');
                displayContent = displayContent.replace(regex, '<span class="highlight">$1</span>');
            }
            displayTitle = formatText(displayTitle);
            displayContent = formatText(displayContent);

            const copySvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

            const locHtml = log.location ? `<span class="location-badge mono">${formatText(escapeHtml(log.location))}</span>` : '';
            
            let typeBadgeClass = "title-badge mono";
            let typeBadgeLabel = formatText(escapeHtml(log.title));
            if (log.type === 'audio') { typeBadgeClass = "title-badge audio-badge mono"; typeBadgeLabel = "AUDIO LOG"; }
            else if (log.type === 'image') { typeBadgeClass = "title-badge mono border border-blue-800 bg-blue-900/30 text-blue-400"; typeBadgeLabel = "IMAGE ATTACHMENT"; }
            else if (log.type === 'memo') { typeBadgeClass = "title-badge mono border border-yellow-800 bg-yellow-900/30 text-yellow-400"; typeBadgeLabel = "INTEROFFICE MEMO"; }
            else if (log.type === 'order') { typeBadgeClass = "title-badge mono border border-teal-800 bg-teal-900/30 text-teal-400"; typeBadgeLabel = "MCM ORDER FORM"; }
            
            const typeBadge = `<span class="${typeBadgeClass}">${typeBadgeLabel}</span>`;
            
            const titleDisplay = (log.type === 'audio' || log.type === 'image' || log.type === 'memo' || log.type === 'order') ? `<h2 class="text-lg font-bold text-white mono leading-tight mb-3">${displayTitle}</h2>` : '';

            let rawCopyText = log.content || '';
            let cardBodyHtml = '';
            
            if (log.type === 'audio') {
                const audioPlayerHtml = log.audioUrl ? `
                    <div class="audio-player-container bg-[#121212] border border-zinc-800 p-3 rounded-lg flex items-center gap-3 mt-4">
                        <button class="play-pause-btn text-purple-400 hover:text-purple-300 transition-colors flex-shrink-0" onclick="toggleAudio(this, 'audio-${log.id}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <div class="bg-zinc-800 h-2 flex-grow rounded cursor-pointer relative" onmousedown="startScrub(event, 'audio-${log.id}')">
                            <div class="progress-fill bg-purple-500 h-full rounded w-0 pointer-events-none transition-all duration-75"></div>
                        </div>
                        <span class="time-display text-zinc-500 text-xs mono pointer-events-none w-24 text-right flex-shrink-0">0:00 / 0:00</span>
                        <a href="${escapeHtml(log.audioUrl)}" download target="_blank" class="text-zinc-500 hover:text-purple-400 transition-colors flex-shrink-0 ml-1" title="Download Audio">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </a>
                        <audio id="audio-${log.id}" src="${escapeHtml(log.audioUrl)}" ontimeupdate="updateProgress(this)" onloadedmetadata="setDuration(this)" onended="resetPlayer(this)"></audio>
                    </div>
                ` : '';
                cardBodyHtml = `<div class="content-area text-zinc-400 text-sm flex-grow">${displayContent}</div>${audioPlayerHtml}`;
            } else if (log.type === 'image') {
                const urls = (log.imageUrls || (log.imageUrl ? [log.imageUrl] : [])).filter(u => u.trim() !== '');
                rawCopyText = urls.join('\n');
                
                if (urls.length === 0) {
                    cardBodyHtml = `<div class="text-zinc-600 text-sm italic">No image URLs provided.</div>`;
                } else if (urls.length === 1) {
                    cardBodyHtml = `
                        <div class="mt-2 relative cursor-pointer group" onclick="openImageModal('${escapeHtml(urls[0])}')">
                            <a href="${escapeHtml(urls[0])}" download target="_blank" onclick="event.stopPropagation()" class="absolute top-2 right-2 bg-black/70 text-zinc-300 p-1.5 rounded hover:text-green-400 hover:bg-black transition-colors z-10 opacity-0 group-hover:opacity-100" title="Download Image">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </a>
                            <img src="${escapeHtml(urls[0])}" alt="${escapeHtml(log.title)}" class="w-full h-auto max-h-64 object-contain rounded-lg border border-zinc-800 group-hover:border-blue-500 transition-colors">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg pointer-events-none">
                                <span class="text-white text-sm mono flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg> Expand
                                </span>
                            </div>
                        </div>
                    `;
                } else {
                    const slidesHtml = urls.map((url, i) => `
                        <div class="w-full shrink-0 relative cursor-pointer group snap-center" onclick="openImageModal('${escapeHtml(url)}')">
                            <a href="${escapeHtml(url)}" download target="_blank" onclick="event.stopPropagation()" class="absolute top-2 right-2 bg-black/70 text-zinc-300 p-1.5 rounded hover:text-green-400 hover:bg-black transition-colors z-10 opacity-0 group-hover:opacity-100" title="Download Image">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </a>
                            <img src="${escapeHtml(url)}" alt="${escapeHtml(log.title)} - ${i+1}" class="w-full h-auto max-h-64 object-contain rounded-lg border border-zinc-800 group-hover:border-blue-500 transition-colors">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-lg pointer-events-none">
                                <span class="text-white text-sm mono flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg> Expand
                                </span>
                            </div>
                            <div class="absolute bottom-2 right-2 bg-black/70 text-zinc-300 text-[10px] px-2 py-1 rounded mono shadow backdrop-blur-sm">${i+1} / ${urls.length}</div>
                        </div>
                    `).join('');

                    cardBodyHtml = `
                        <div class="mt-2 relative group">
                            <div class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide pb-2 gap-4" id="carousel-${log.id}">
                                ${slidesHtml}
                            </div>
                            <button onclick="event.stopPropagation(); document.getElementById('carousel-${log.id}').scrollBy({left: -document.getElementById('carousel-${log.id}').clientWidth, behavior: 'smooth'})" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-black/60 text-white border border-zinc-700 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black hover:border-blue-500 z-10 shadow-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </button>
                            <button onclick="event.stopPropagation(); document.getElementById('carousel-${log.id}').scrollBy({left: document.getElementById('carousel-${log.id}').clientWidth, behavior: 'smooth'})" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full bg-black/60 text-white border border-zinc-700 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black hover:border-blue-500 z-10 shadow-lg">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                        </div>
                    `;
                }
            } else if (log.type === 'memo') {
                const memoLines = [];
                if(log.memoDate) memoLines.push('Date: ' + log.memoDate);
                if(log.memoTo) memoLines.push('To: ' + log.memoTo);
                if(log.memoFrom) memoLines.push('From: ' + log.memoFrom);
                if(log.memoCC) memoLines.push('CC: ' + log.memoCC);
                if(log.memoSubject) memoLines.push('Subject: ' + log.memoSubject);
                memoLines.push('');
                if(log.content) memoLines.push(log.content);
                if(log.memoSignature) { memoLines.push(''); memoLines.push(log.memoSignature); }
                rawCopyText = memoLines.join('\n').trim();

                cardBodyHtml = `
                    <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 mb-4 text-sm mono text-zinc-300 flex flex-col gap-2 shadow-inner">
                        ${log.memoDate ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">DATE:</span> <span class="leading-relaxed">${formatText(escapeHtml(log.memoDate))}</span></div>` : ''}
                        ${log.memoTo ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">TO:</span> <span class="leading-relaxed">${formatText(escapeHtml(log.memoTo))}</span></div>` : ''}
                        ${log.memoFrom ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">FROM:</span> <span class="leading-relaxed">${formatText(escapeHtml(log.memoFrom))}</span></div>` : ''}
                        ${log.memoCC ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">CC:</span> <span class="leading-relaxed">${formatText(escapeHtml(log.memoCC))}</span></div>` : ''}
                        ${log.memoSubject ? `<div class="mt-1 pt-3 border-t border-zinc-800 flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-20 shrink-0 mt-0.5">SUBJECT:</span> <span class="leading-relaxed">${formatText(escapeHtml(log.memoSubject))}</span></div>` : ''}
                    </div>
                    <div class="content-area text-zinc-300 text-sm flex-grow">${displayContent}</div>
                    ${log.memoSignature ? `<div class="mt-6 pt-4 border-t border-zinc-800/50 text-zinc-400 font-serif italic text-lg">${formatText(escapeHtml(log.memoSignature))}</div>` : ''}
                `;
            } else if (log.type === 'order') {
                const orderLines = [];
                if(log.orderDate) orderLines.push('ORDER DATE: ' + log.orderDate);
                if(log.orderPickup) orderLines.push('PICKUP DATE: ' + log.orderPickup);
                if(log.orderName) orderLines.push("PURCHASER'S NAME: " + log.orderName);
                if(log.orderDate || log.orderPickup || log.orderName) orderLines.push('');
                if(log.orderBody) orderLines.push('BODY TYPE: ' + log.orderBody);
                if(log.orderQty) orderLines.push('QUANTITY: ' + log.orderQty);
                if(log.orderMaterials) orderLines.push('REQUESTED MATERIALS: ' + log.orderMaterials);
                if(log.orderDetails) orderLines.push('REQUESTED DETAILS: ' + log.orderDetails);
                if(log.orderBody || log.orderQty || log.orderMaterials || log.orderDetails) orderLines.push('');
                if(log.orderSpecial) orderLines.push('SPECIAL FUNCTIONS(2X ORIGINAL FEE): ' + log.orderSpecial);
                rawCopyText = orderLines.join('\n').trim();

                cardBodyHtml = `
                    <div class="bg-zinc-900/50 p-4 rounded-lg border border-zinc-800 text-sm mono text-zinc-300 flex flex-col gap-2 shadow-inner">
                        ${log.orderDate ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">ORDER DATE:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderDate))}</span></div>` : ''}
                        ${log.orderPickup ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">PICKUP DATE:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderPickup))}</span></div>` : ''}
                        ${log.orderName ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">PURCHASER'S NAME:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderName))}</span></div>` : ''}
                        ${(log.orderDate || log.orderPickup || log.orderName) && (log.orderBody || log.orderQty || log.orderMaterials || log.orderDetails) ? `<div class="my-1 border-t border-zinc-800/50"></div>` : ''}
                        ${log.orderBody ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">BODY TYPE:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderBody))}</span></div>` : ''}
                        ${log.orderQty ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">QUANTITY:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderQty))}</span></div>` : ''}
                        ${log.orderMaterials ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">REQUESTED MATERIALS:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderMaterials))}</span></div>` : ''}
                        ${log.orderDetails ? `<div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-2"><span class="text-zinc-500 font-bold sm:w-48 shrink-0 mt-0.5">REQUESTED DETAILS:</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderDetails))}</span></div>` : ''}
                        ${log.orderSpecial ? `<div class="mt-1 pt-3 border-t border-zinc-800"><span class="text-zinc-500 font-bold block mb-1">SPECIAL FUNCTIONS(2X ORIGINAL FEE):</span> <span class="leading-relaxed break-words">${formatText(escapeHtml(log.orderSpecial))}</span></div>` : ''}
                    </div>
                `;
            } else {
                cardBodyHtml = `<div class="content-area text-zinc-400 text-sm flex-grow">${displayContent}</div>`;
            }

            const encodedCopyText = encodeURIComponent(rawCopyText).replace(/'/g, "%27");

            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2 items-center flex-wrap">
                        ${typeBadge}
                        ${locHtml}
                    </div>
                    <button class="copy-btn" title="Copy Content" onclick="copyContent(this, '${encodedCopyText}')">${copySvg}</button>
                </div>
                ${titleDisplay}
                <div class="content-wrapper flex flex-col">
                    ${cardBodyHtml}
                </div>
            `;
            return div;
        }

        function copyContent(btn, encodedText) {
            const textarea = document.createElement('textarea');
            textarea.value = decodeURIComponent(encodedText);
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1500);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; render(); });
        document.getElementById('filterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                render();
            }
        });
        document.getElementById('subFilterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-btn')) {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.dataset.type;
                render();
            }
        });
        
        // Start execution
        init();
    </script>
</body>
</html>
