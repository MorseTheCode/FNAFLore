        // UI STATE
        let currentCategory = 'all';
        let currentSearch = '';

        /** Helpers */
        function decodeBinary(str) {
            return str.split(' ').map(bin => String.fromCharCode(parseInt(bin, 2))).join('');
        }
        function extractIdNumber(idStr) {
            const matches = idStr.match(/\d+/);
            return matches ? parseInt(matches[0], 10) : 0;
        }

        // TAGGING LOGIC
        function getTagsForLog(log) {
            const tags = [];
            const key = log.keyId.toLowerCase();
            const content = log.content.toLowerCase();
            const title = log.title.toLowerCase();

            if (key.includes('admin')) tags.push('admin');
            
            if (key.includes('misc_3') || key.includes('misc12') || key.includes('misc10') || key.includes('misc11')) {
                tags.push('mcm');
            }

            if (key.includes('misc06') || key.includes('misc07') || key.includes('misc13') || key.includes('doll01') || key.includes('doll02')) {
                tags.push('internal');
            }

            if (title.includes('fiona') || content.includes('fiona') || key.includes('misc27a') || key.includes('misc03')) {
                tags.push('fiona');
            }

            if (content.includes('- wa') || content.includes('w.a.') || content.includes('franchise locations')) {
                tags.push('wa');
            }

            if (content.includes('edwin') || title.includes('inventorhouse') || content.includes('ed\'s modular')) {
                tags.push('edwin');
            }

            return tags;
        }

        function pairLogs() {
            const raw = logsData.Loc_TextLogs;
            const paired = [];
            const processedKeys = new Set();

            for (let key in raw) {
                if (key.endsWith("_Title")) {
                    const base = key.replace("_Title", "");
                    const contentKey = base + "_Content";
                    let title = raw[key];
                    if (/^[01 ]+$/.test(title)) {
                        title = `${title} (${decodeBinary(title)})`;
                    }
                    
                    // CLEANING: Remove leading spaces/breaks from raw content
                    const rawContent = (raw[contentKey] || "[NO CONTENT FOUND]").trim();
                    
                    const logObj = {
                        keyId: base,
                        title: title,
                        content: rawContent,
                        sortNum: extractIdNumber(base)
                    };
                    logObj.tags = getTagsForLog(logObj);
                    paired.push(logObj);
                    processedKeys.add(key); processedKeys.add(contentKey);
                }
            }

            for (let key in raw) {
                if (key.endsWith("_Content") && !processedKeys.has(key)) {
                    const base = key.replace("_Content", "");
                    const logObj = {
                        keyId: base,
                        title: "UNTITLED LOG (" + base.replace("Loc_TextLogs_", "") + ")",
                        content: raw[key].trim(),
                        sortNum: extractIdNumber(base)
                    };
                    logObj.tags = getTagsForLog(logObj);
                    paired.push(logObj);
                }
            }
            return paired;
        }

        const pairedLogs = pairLogs();

        function getGroupedLogs(logs) {
            const groups = [
                { name: "The Admin Conference Room Incident", match: (l) => l.tags.includes('admin') || l.keyId.includes('Misc20') },
                { name: "MCM Customer Disputes & Market Reports", match: (l) => l.tags.includes('mcm') },
                { name: "Confidential Internal Group Chats", match: (l) => l.tags.includes('internal') },
                { name: "The Legacy of Fiona & Early Designs", match: (l) => l.tags.includes('fiona') },
                { name: "The Edwin Murray Collection", match: (l) => l.tags.includes('edwin') },
                { name: "Retail & Surveillance Logs", match: (l) => l.keyId.includes('CostumeBack') },
                { name: "Miscellaneous Archive Data", match: (l) => true } 
            ];

            const result = [];
            const processedIds = new Set();

            groups.forEach(group => {
                const groupLogs = logs.filter(l => !processedIds.has(l.keyId) && group.match(l));
                if (groupLogs.length > 0) {
                    groupLogs.sort((a,b) => a.sortNum - b.sortNum);
                    result.push({ title: group.name, logs: groupLogs });
                    groupLogs.forEach(l => processedIds.add(l.keyId));
                }
            });

            return result;
        }

        function render() {

            let filtered = pairedLogs.filter(log => {
                const matchesSearch = log.title.toLowerCase().includes(currentSearch.toLowerCase()) || 
                                    log.content.toLowerCase().includes(currentSearch.toLowerCase());
                const matchesCat = currentCategory === 'all' || log.tags.includes(currentCategory);
                return matchesSearch && matchesCat;
            });

            document.getElementById('logCount').innerText = filtered.length;

            if (currentCategory === 'all' && !currentSearch) {
                const grouped = getGroupedLogs(filtered);
                grouped.forEach(group => {
                    const groupSection = document.createElement('div');
                    groupSection.className = 'context-group';
                    groupSection.innerHTML = `<div class="group-header mono">${group.title}</div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
                    
                    group.logs.forEach(log => grid.appendChild(createCard(log)));
                    groupSection.appendChild(grid);
                    display.appendChild(groupSection);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';
                
                filtered.sort((a,b) => a.sortNum - b.sortNum);
                filtered.forEach(log => grid.appendChild(createCard(log)));
                display.appendChild(grid);
            }
        }

        function createCard(log) {
            const div = document.createElement('div');
            div.className = 'log-card p-5 rounded-xl flex flex-col gap-3';
            
            let displayTitle = log.title;
            let displayContent = log.content;
            if (currentSearch) {
                const regex = new RegExp(`(${currentSearch})`, 'gi');
                displayTitle = displayTitle.replace(regex, '<span class="highlight">$1</span>');
                displayContent = displayContent.replace(regex, '<span class="highlight">$1</span>');
            }

            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="title-badge mono">${log.keyId.replace('Loc_TextLogs_', '')}</span>
                </div>
                <h2 class="text-lg font-bold text-white mono leading-tight">${displayTitle}</h2>
                <div class="content-area text-zinc-400 text-sm border-t border-zinc-800 pt-3 mt-auto">
                    ${displayContent}
                </div>
            `;
            return div;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        document.getElementById('filterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                render();
            }
        });

        render();
    </script>
</body>
</html>
