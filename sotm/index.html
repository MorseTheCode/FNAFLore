<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCM Text Logs Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
        }

        .mono {
            font-family: 'Space Mono', monospace;
        }

        .log-card {
            background: #1a1a1a;
            border: 1px solid #333;
            transition: all 0.2s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .log-card:hover {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.1);
        }

        .category-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #a1a1aa;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .category-btn.active {
            background: #4ade80;
            color: #0a0a0a;
            border-color: #4ade80;
            font-weight: 600;
        }

        .type-btn {
            background: #18181b;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
            transition: all 0.2s;
        }
        .type-btn.active {
            background: #3f3f46;
            color: #f4f4f5;
            border-color: #52525b;
        }

        .title-badge {
            background: #2d2d2d;
            color: #4ade80;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .audio-badge {
            background: #3b0764; /* Purple 900 */
            color: #d8b4fe;      /* Purple 300 */
            border: 1px solid #7e22ce;
        }

        .location-badge {
            background: #1e293b;
            color: #94a3b8;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .context-group {
            border-left: 2px solid #4ade80;
            padding-left: 1.5rem;
            margin-bottom: 3rem;
        }

        .group-header {
            margin-bottom: 1rem;
            color: #4ade80;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .content-area {
            line-height: 1.4;
            white-space: pre-line;
            word-break: break-word;
            margin-top: -3px; 
            display: block;
        }

        .content-wrapper {
            border-top: 1px solid #333;
            padding-top: 0.75rem;
            margin-top: 0;
            flex-grow: 1;
        }

        .highlight {
            background-color: rgba(74, 222, 128, 0.3);
            color: #fff;
        }

        .copy-btn {
            background: transparent;
            color: #a1a1aa;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }
        
        .copy-btn:hover {
            color: #4ade80;
            background: #27272a;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
    </style>
</head>
<body class="pb-8">

    <div class="max-w-7xl mx-auto px-4 md:px-8">
        <div class="pt-4 md:pt-8 mb-4">
            <h1 class="text-3xl md:text-4xl font-bold mono text-green-400 mb-2">MCM_ARCHIVE_LOGS</h1>
            <p class="text-zinc-500 italic">Loc_TextLogs & Audio Captures: Documenting the MCM Lifecycle</p>
        </div>
        
        <header class="sticky top-0 z-50 bg-[#0a0a0a] pt-2 mb-6 border-b border-zinc-800 pb-4">
            <div>
                <input type="text" id="searchInput" placeholder="Search titles, content, or locations..." 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500 mono text-green-400">
            </div>

            <!-- Category Filters -->
            <div id="filterBar" class="mt-4 flex flex-wrap gap-2 overflow-x-auto pb-2">
                <button class="category-btn active" data-cat="all">All Logs</button>
                <button class="category-btn" data-cat="text">Text Logs</button>
                <button class="category-btn" data-cat="audio">Audio Logs</button>
                <button class="category-btn" data-cat="admin">Admin</button>
                <button class="category-btn" data-cat="mcm">MCM Business & Complaints</button>
                <button class="category-btn" data-cat="internal">Employee Internal Group Chats</button>
                <button class="category-btn" data-cat="fiona">Fiona</button>
                <button class="category-btn" data-cat="wa">W.A & Leak</button>
                <button class="category-btn" data-cat="edwin">Edwin</button>
                <button class="category-btn" data-cat="recovery">Recovery Team 12</button>
                <button class="category-btn" data-cat="sleepymoon">Sleepy Moon</button>
            </div>
            
            <div id="subFilterBar" class="hidden mt-1 flex gap-2">
                <button class="type-btn active text-xs px-3 py-1 rounded mono" data-type="all">All Types</button>
                <button class="type-btn text-xs px-3 py-1 rounded mono" data-type="text">Text Only</button>
                <button class="type-btn text-xs px-3 py-1 rounded mono" data-type="audio">Audio Only</button>
            </div>

            <div class="mt-4 text-zinc-500 text-sm mono">
                ENTRIES_LOADED: <span id="logCount" class="text-green-500 font-bold">0</span>
            </div>
        </header>

        <div id="logDisplay" class="space-y-8">
            <!-- Content will be injected here -->
        </div>
    </div>

    <script>
        // Data sets cleanly organized
        const audioLogs = [
            { title: "Meet Up", location: "Showroom Lobby", content: "Edwin: Excuse me. Can I borrow your voice for a project?\nFiona: What for? I don't even know you. I'm brand new here. Let's start again. I'm Fiona. And you are?\nEdwin: Edwin, Edwin Murray. This is my dad's place. But that doesn't matter... I heard you were a puppeteer and I wanted to record your voice.\nFiona: Oh. Well, yes. I used to be.\nEdwin: That's great! Do you mind if I record you for a test?\nFiona: So you want to record me that that? What is it?\nEdwin: It's a new type of audio cassette recorder.\nFiona: I've never seen one like that before.\nEdwin: I made it. It's part of this new system I'm working on. Just speak into the microphone and it'll be sent to me like a work memo. The message will be recorded on a tape drive so that I can listen to it when I get back to my desk on the other side of the building.\nFiona: That's incredible. What do you call it?\nEdwin: Oh. I don't know. I haven't thought of a name yet.\nFiona: Well, how would you describe it in one word?\nEdwin: I guess I would have to say, \"helpful.\" At its core, it is helpful.\nFiona: That's a great name. And I would be delighted to help. What kind of voice should I do?" },
            { title: "Inheritance", location: "Warehouse", content: "Fiona: Ed, honey, how are you holding up? I just heard the news.\nEdwin: I don't know. This is all so much... He's gone. He's gone and now everyone is asking me what to do? And I don't know anything. I can't run a company. I'm not ready... I can't fill his shoes. He knew it. Everyone knew it. The company is going to collapse and they're all going to hate me.\nFiona: Ed, you'll figure it out. Just take a deep breath. It's your company now. Your dad believed in you. Otherwise, he wouldn't have left it to you.\nEdwin: I guess so.\nFiona: If you could change anything you wanted, what would it be?\nEdwin: Maybe... rebrand? We could start making some of my inventions for real." },
            { title: "Focus Needed", location: "Warehouse", content: "Fiona: Ed, you're not going to want to hear this, but there's a lot of grumbling on the work floor. You have a lot of new ideas and new projects coming in, but the staff can't keep up with all your changes. Your creative energy's amazing and I love you for it... ...but I think you need to step back a little and focus on one project at a time." },
            { title: "Underground / Power Surge", location: "IT Room", content: "Edwin: Attention all personnel. The power surges have become more... frequent. Please use extreme caution when venturing down into the tunnels." },
            { title: "Friends", location: "Returns Room", content: "Edwin: What the hell was that? They treat me like some contractor to crack a whip at. Fiona was right. They don't think of me as a friend anymore. This is the last project I ever do for them." },
            { title: "Build to Spec", location: "RnD's mockup woman restroom", content: "Edwin: Test test... journal entry. I got the change order from Hen last night. None of this makes sense. I'm almost done. Why change it now? It would be so much easier to keep using the Springlocks. Just hire some teens to wear the suits like we always do." },
            { title: "Creepy / Change Request", location: "RnD's mockup Safe Room", content: "Edwin: Are they insane? The look of these new animatronics is Fiona's design and they're great. First they approve the art. Then they approve the proofs. Now, they change their minds when we're so close to final. Why would they change them now? Are they pulling my leg? The new concepts are frankly creepy. It doesn't matter... I'm not changing a single bit of her work and they can't make me." },
            { title: "Installation Worries", location: "Roof Access", content: "Fiona: Ed, I hope this message reaches you as soon as you get a break. I have to go help the Fall Fest crew... just for a few days until the installation is finished. It's hard to explain... I just have this terrible feeling like I need to be there so nothing goes wrong... Just in case. Trisha will babysit David while I'm gone. I love you both and I'll be back next week." },
            { title: "Theater Shenanigans", location: "Theater", content: "Edwin: Notice to all workers. All late night shenanigans are to stop immediately. I have some very important TV people coming to look at the show template. I can't have the projector breaking again!" },
            { title: "Death", location: "Theater Backstage", content: "Edwin: Why did you go? You weren't even supposed to be there. You were supposed to be here with me and David. Ugh! How am I supposed to tell David that his mother is gone? How am I supposed to raise a kid on my own? His life is ruined... My life is ruined." },
            { title: "The Frequency", location: "Basement 2 secret workshop", content: "Edwin: Recording... Test. Test. Levels are good. This is where I heard it. It's her, or someone that sounds like her. Set frequency to 4625...\nRadio: (Static)\nEdwin: Hello. Hello? Is anyone there? Over.\nRadio: (Static)\nEdwin: Say something. It's me, Edwin. Over.\nRadio: (Static)\nFiona: That's great, honey, but you're missing the party." },
            { title: "Training", location: "Workshop's Springlock suits assembly room", content: "Edwin: David. I want you introduce you to someone. This is M1.\nDavid: Why does it look like that?\nEdwin: Look like what?\nDavid: It's scary.\nEdwin: It's an endo skeleton. It won't always look like this. It'll wear fun costumes.\nDavid: Like what?\nEdwin: Anything you want. It can fit into any costume we've created. Think of it as your new babysitter. But it doesn't get paid and go home. It'll stay with us and help around the house." },
            { title: "Playground", location: "Loading Docks", content: "Edwin: Look, I get your concerns, I do, but they're all just groundless. This is the perfect spot for David's playground. I can watch him play while I'm loading and unloading freight, and he'll be under watch at all times out there. The loading dock is like two hundred feet away, and there's a fence and everything. I know you're my lawyer and all, but there's no regulation that says I can't have it there, so just get off my back. Besides, David loves the new slide. It'll be fine." },
            { title: "Trust No One Fiona / Trust No One pt2", location: "Inventor's House Library", content: "Fiona/M1: Edwin, you need to listen. I know you are excited, but you can't let them know about me. It's not safe. They wouldn't understand. Keep it between us for now." },
            { title: "Here For You", location: "RnD's Mimic Lair", content: "Fiona/M1: Edwin, it doesn't make sense. It's terrible and there's no logic behind it. It happened and you have to deal with it. You did it before. We can fix things together. I am here to help." },
            { title: "Refusal", location: "Inventor's House Workshop Room (with blueprints)", content: "Edwin: For the last time, NO. It wouldn't be him. Who am I kidding, you're not really you! Ugh, I've been so stupid.\nFiona/M1: Edwin, calm down and give it some thought. Try again. Make another and we can all be together.\nEdwin: All this time wasted! I should have been having fun with him, playing games and teaching him how to make things... But, I didn't. You. You! I let a machine raise my kid. You're not real. What was I thinking?!\nFiona/M1: You do not mean that. It is me. I'm Fiona.\nEdwin: Stop talking like her. You're not her. I never want to hear or even think about you ever again. Ever!" },
            { title: "Try Again", location: "Inventor's House Workshop Room", content: "Fiona/M1: Edwin, you can't put it off any longer. You need to try again. Build another." },
            { title: "Trust No One", location: "Story Time Showroom", content: "Edwin: Edwin, never forget. They're behind it. Don't trust them. Never tell them. They want to destroy you. Dad was right." },
            { title: "Make a Copy", location: "Executive Suite", content: "Edwin: Project update. I figured it out. There's a leak. Someone told them about M2. Well, they can't have it. Every copy has failed. I don't even know why it worked the first time, but it did. It's just not ready." },
            { title: "Announcement", location: "Admin Wing", content: "Edwin: Attention traitors, admin wing permissions have been revoked. And no, you can't clear out your desks! You stole my work. Now your jackets, purses and coffee mugs and anything else belongs to me. Maybe I'll go find someone to sell your stuff to. How does that feel?" },
            { title: "The Incident", location: "Basement 2", content: "Edwin: ...Stop. You're not him. You're not! Stop sounding like him!" },
            { title: "M2 Journal Entry / Final Moments", location: "Inventor's House (Endgame)", content: "M2: Test test... Journal entry. Too bad. The new power test was a failure. Due to a minor... detonation, there is damage to my office interior as well as a small fire. Note to self. A portable cleaner that gets rid of smoke damage... Better yet, a Clown-O-Vac attachment.\nEdwin: Help... M2. Respond. Emergency... Call for help.\nM2: Daddy's busy, buddy. Why don't you go outside and play.\nEdwin: Please. I can't move. I can't feel my legs...\nM2: Speaking of legs. What do you think? I just finished mine. There are still a few kinks to work out...\nEdwin: I'm... I'm sorry, M2. I... lost my temper. I was always going to fix you... Please... call for help... M2. Respond.\nM2: Can't right now, buddy. We can do something fun tomorrow. I promise. Ask your mom, if she's not busy.\nEdwin: M2. Help..." }
        ];

        const textLogs = [
            { id: "Admin1", title: "Admin - Dec 1st - 12:00 pm", location: "Admin Wing.", content: "To all employees, Mr. Murray has taken over conference room 1 for a surprise birthday party for his son. The old keycode will not work anymore, so please stop trying 53782. It’s getting annoying. - Milton" },
            { id: "Admin2", title: "Admin - Dec 1st - 12:15 pm", location: "Admin Wing.", content: "Wait. What about Bev’s birthday party? That was supposed to be this Saturday. She turned 50 yesterday, and you're only 50 once! - Amy" },
            { id: "Admin3", title: "Admin - Dec 1st - 12:30 pm", location: "Admin Wing.", content: "Obviously, we’ll have to move Bev’s party to the breakroom in the main hallway. Mr. Murray has given me permission to change the code to 49762. - Milton" },
            { id: "Admin4", title: "Admin - Dec 2nd - 4:13 am", location: "Admin Wing.", content: "Hey everybody! Don’t tell Milton, but I figured out how to change the keycode to the conference room. I just added 300 to it, just to mess with him! - Bob" },
            { id: "Admin5", title: "Admin - Dec 2nd - 4:18 am", location: "Admin Wing.", content: "Well, if you’re going to do that, I’m going to change the first two digits to 29. It’s my favorite number, so don’t change it! - Wally" },
            { id: "Admin6", title: "Admin - Dec 3rd - 3:05 pm", location: "Admin Wing.", content: "Hey, I took Wally off this note. I changed the first two digits to 21, just because he’s such a jerk. I can’t wait to see his head explode. - Penny" },
            { id: "Admin7", title: "Admin - Dec 3rd - 3:20 pm", location: "Admin Wing.", content: "Okay everyone, that is quite enough. No more changes to the keycode please. - Milton" },
            { id: "Admin8", title: "Admin - Dec 4th - 8:19 pm", location: "Admin Wing.", content: "Hey Penny, I’m going to change the first two digits to 01. Because I’m number 1! - Bob" },
            { id: "Admin9", title: "Admin - Dec 4th - 8:34 pm", location: "Admin Wing.", content: "That sounds great! I’m going to change the last two digits to Bev’s age. Justice for Bev! - Penny" },
            { id: "Admin10", title: "Admin - Dec 4th - 10:00 pm", location: "Admin Wing.", content: "I just saw the code changed again. Anyone seen adjusting the code will be written up! - Milton" },
            { id: "Admin11", title: "Admin - Dec 5th - 5:00 am", location: "Admin Wing.", content: "Hey everyone. I was here late so I added another 300 to the code. Anyone have a camera when Milton tries to open it again! Priceless! - Bob" },
            { id: "Admin12", title: "Admin - Dec 6th - 4:00 pm", location: "Admin Wing.", content: "To all Admin staff members. Mr. Murray’s party has been canceled, due to the recent tragic events. Please do not enter the conference room until further notice. - Milton" },
            { id: "Misc01", title: "Moving On!", location: "Theater Backstage.", content: "Ken, after one interview, they offered me the job! It happened so quick. No questions about my work or skills, they asked one question, \"When can you start?\"\n\nI'm going to make double what I make here. You should come with me. There's a referral bonus if we can get more Murray employees to jump ship." },
            { id: "Misc02", title: "Staff Contacts", location: "Admin Wing upper floor.", content: "We are almost there. I need the rest of the Murray staff contact info. The sooner the better. You get that for me, and I can sweeten the deal. How would you like to manage one of the new franchise locations? - W.A." },
            { id: "Misc03", title: "Have you heard Fiona?", location: "Warehouse.", content: "I heard it again this morning when I was down in R&D. Very clearly through one of the vents, it was Fiona's voice, I swear it on my mother's grave. I heard her and Edwin laughing and joking. Why would Edwin lie about Fall Fest? Did they fake her death for insurance money? I never did trust them." },
            { id: "Misc04", title: "01101000 01110101 01110010 01110100 (hurt)", location: "Executive Suite.", content: "Edwin, please talk to me. We need to stop it together. Here are the blueprints for a \"Cradle\". It can keep David safe and provide boundaries. It's a type of computer, and it's bigger than anything you've done before. If you won't finish the program, consider building the cradle. It will keep people safe." },
            { id: "Misc05", title: "We need to go", location: "Workshop.", content: "Me and Stan are out of here. It's time to jump ship before things get ugly. I have a bunch of Fiona's character patterns and Stan is taking what he can. Join us. With everything we know about the restaurant project, we can start our own machine shop." },
            { id: "Misc06", title: "Group Chat #1", location: "Main/South Hall.", content: "Hey everyone. These mail boxes are everywhere. If you see anything \"strange\" we can keep the group informed. - Pete" },
            { id: "Misc07", title: "Group Chat #2", location: "Main/South Hall.", content: "Great idea, Pete. Mr. Murray hasn't used these mailboxes for so long, it should be safe. I'd love to have some place for all of us to talk in private. I feel like the bossman is listening all the time... - Penny" },
            { id: "Misc08", title: "Love That Ticket Booth!", location: "Showroom Lobby.", content: "This one of a kind ticket booth plays music and it collects tickets. It can hold signs for advertising or directions with its many arms. Additional swings can be attached and make it a fun ride (We'll throw the swings in for free as a bonus)." },
            { id: "Misc09", title: "Vacations", location: "Workshop.", content: "My weekend vacation request was refused. I quit! Tell Jake I'll be back for my things on Monday." },
            { id: "Misc10", title: "Sales Pitch", location: "Workshop upper area.", content: "Mr. Murray. Bob in marketing had an amazing idea. Costumes are great for sports teams and high school pep rallys. We could almost double our sales output if we contacted schools. I will await your reply." },
            { id: "Misc11", title: "Sales Pitch - Rejected!", location: "Workshop upper area.", content: "No. Not for sports use. and NOT for personal use either... Sports never did anything good for me, so I'm not doing anything good for sports" },
            { id: "Misc12", title: "Please Advise", location: "Admin Wing upper floor.", content: "Dear Mr. Murray. The returns are over flowing. The orders are drying up. Please advise." },
            { id: "Misc13", title: "Group Chat #3", location: "Loading Docks.", content: "Why are we turning down work? The floats have been doing really well. Ed's modular system is groundbreaking. And now he wants to shut the whole thing down? He just sits in his office talking to that thing. I have no clue what to do.\n- Barbara" },
            { id: "Misc14", title: "Confidential", location: "Main/South Hall, executive restroom.", content: "..software development and the entire MCM catalog. We would love to keep you on as a lead engineer. Although we now technically own the land, we would never touch the house your parents built. We feel this offer has been more than fair, considering how far behind you are. It's just too much for you to handle alone. We are waiting for your response. - WA" },
            { id: "Misc19", title: "Chica's Party World", location: "Warehouse.", content: "Dear Mr. Murray, Fiona is amazing. The client is very happy with her chicken designs. Their sales are through the roof. I just wish the costume looked a little bit more like Fiona's art... I'm worried about how it will work with kids. It gives me nightmares.\n- Milton" },
            { id: "Misc20", title: "Admin - Dec 1st - 8:00 am", location: "Admin Wing.", content: "Attention. We're going to need everyone to come in this weekend. This is not optional. The party is on Saturday in the admin conference room 1. Don't tell David. It's a surprise. - EM" },
            { id: "Misc21", title: "01001000 01001111 01001101 01000101 (HOME)", location: "RnD, Mimic's Lair/Dark Ride.", content: "Home. My home." },
            { id: "Misc22", title: "01010011 01000001 01000100 (SAD)", location: "Executive Suite.", content: "Edwin, are we losing our home? I don't understand. Wasn't I good enough?" },
            { id: "Misc23", title: "Projector Issues", location: "Theater Backstage.", content: "Lee, the projector is down again in the theater. I swear this stupid show is cursed. What was Edwin thinking, making this kid's thing? Plus those things just creep me out." },
            { id: "Misc24", title: "Power", location: "Storage.", content: "Gary, I finally found the missing pieces of this stupid power device. Just got to head over there and turn the power on. I'll check in soon." },
            { id: "Misc25a", title: "Waste of Money", location: "Warehouse, IT Room blocked entrance.", content: "None of this makes sense. Mr. Murray told us to trash all the old equipment in the wood shop. Then Stevenson gets a purchase order for the exact same stuff we're throwing out and told to install it upstairs. The old stuff is all perfectly functional. It's a waste of money. So, Stevenson asks him about it and gets fired. He has to be out by the end of the day. My advice is keep your mouth shut. Don't even think about it. Just clear out the tunnels." },
            { id: "Misc26", title: "@#$#*%^", location: "Admin Wing upper floor.", content: "I'm almost there. I can see the last permission upgrade. I'm going to get that Christmas Bonus, even if it kills me!" },
            { id: "Misc27a", title: "Original Designs (Alt. ver. of \"Creepy/Change Request\" Audio Log)", content: "Are they insane? The look of these new animatronics is Fiona's design and they're great. First they approve the art. Then they approve the proofs. Now, they change their minds when we're so close to final. Why would they change them now? Are they pulling my leg? The new concepts are frankly creepy. It doesn't matter... I'm not changing a single bit of her work and they can't make me." },
            { id: "Misc27b", title: "Springlocks", location: "RnD's Mockup Kitchen.", content: "Fiona, the new springlocks are working well, even with the water damage. They should be ready for the diner soon. I’ll just make sure to warn Hen about some of the more… odd behaviors they might have." },
            { id: "Misc28", title: "*@#&^$&%", location: "Warehouse upper floor.", content: "I stopped the show. I don't think there's another way in. I should be safe for now. A maniac in a costume chasing me. Like something out of a drive in movie. NO one is ever going to believe me. Just one guy or a whole group of psychos?" },
            { id: "Misc29", title: "@#*$^%A", location: "Welcome Lobby storage area.", content: "I hope this message reaches someone. There's something outside. I have no idea what it wants, but I can still hear Thompson's screams.... I didn't sign up for this." },
            { id: "Misc_30", title: "Locators", location: "Basement 2.", content: "Can someone please mark where we're supposed to go down there? Bob went down and I haven't seen him in days." },
            { id: "Misc_31", title: "So bored!", location: "Retail Showroom employee back area (near basement 2 elevator).", content: "Hey Clarence, you as bored as I am? I can't believe we got the Retail Showroom detail again. So boring.\n\nAlthough did you finally get into the elevator? That thing hasn't worked in so long, I don't even think Murray knows what's down there anymore. - Shawn" },
            { id: "Misc_32", title: "Night Shift", location: "Basement 1.", content: "Hey. Hey! Is anybody up there? I'm stuck down here! The elevator isn't working, and I'm getting really hungry. Is anyone getting this message?" },
            { id: "Misc_33", title: "Return Letter - Mycellium Men", location: "Returns Room.", content: "Dear Mr. Murray, \n\nI'm writing this to complain about my purchase of the Mushmen Music Machine. It learned my child's musical tastes, but it also imitated everything it heard! TV commercials, blenders, and even private conversations between my husband and me. I am returning it immediately. \n\nSincerely, \nA. Dumas" },
            { id: "Misc_34", title: "Return Letter - Jest Cereal", location: "Returns Room.", content: "Dear Mr. Murray and Co., \n\nMy child loves your Jest Cereal. However, the pranks inside are extremely inappropriate. The hand buzzer paralyzed our dog Fido! We are never buying this cereal ever again. \n\nSincerely, \nE. Guerrero" },
            { id: "Misc_35", title: "Return Letter - Stay Up Latte", location: "Returns Room.", content: "Dear MCM,\n\nMy husband is a steel worker, and recently he was moved to the night shift. He tried your \"Stay Up Latte\" and it worked wonders for about two weeks. He is now in the hospital because of your drink. You will be hearing from our lawyers soon. \n\nR. Quinn" },
            { id: "Misc_36", title: "Return Letter - Murray's Magic Coat Rack", location: "Returns Room.", content: "Dear Mr. Murray, \n\nWe bought your Magic Coat Rack last May. It was an amazing addition to our home. But lately it seems to change size at random. One morning I came out to find all my coats flung across the room and the coat rack ten feet tall! Can you send us instructions on how to fix this? We're afraid someone might get hurt. \n\nSincerely,\nB. Wyatt" },
            { id: "Misc_37", title: "Spell Check", location: "Workshop.", content: "Ed! How many times did I tell you? \"Mycelium\" only has one 'l'. Now, all the marketing images are misspelled. Our clients are going to think we make mistakes and don't pay attention to the details. Is there any way to fix it now?" },
            { id: "Misc_38", title: "Spelling is fine!", location: "Workshop.", content: "I know, I know. I don't think it's that big of a problem. The misspelling actually helps us when it comes to possible copywrite issues. The double 'l' spelling protects us. Nobody will notice anyway." },
            { id: "Doll01", title: "Group Chat #4", location: "Doll House.", content: "Hey, I can't get the incinerator up and running. The chutes are getting clogged again. - Gary" },
            { id: "Doll02", title: "Group Chat #5", location: "Doll House.", content: "Anyone notice that the door locks now? What are we supposed to do, sleep here? - Ralph" },
            { id: "Doll03", title: "Energy Quota", location: "Recycling Centre.", content: "All personnel are expected to meet their energy quotes before returning home. No exceptions. - Milton" },
            { id: "Doll04", title: "I can't take it", location: "Doll House.", content: "Barb, I swear if I hear that song one more time I'm going to tear that Dollie off her hinges. I have no clue how much longer I can take it here." },
            { id: "Theater1", title: "Theater - One more injury?", location: "Theater.", content: "Ralph went to the hospital last night. That suit is going to be the death of one of us. One more injury and I'm out of here. I mean it this time." },
            { id: "Theater2", title: "Theater - Anyone seen Gary?", location: "Theater.", content: "Haven't seen Gary... I'm going to check the theatre. Found some films and I know he wanted to get the projector up and running.." },
            { id: "Exterior", title: "Mail - Aug 3rd", location: "Inventor's House front gate (outside of MCM).", content: "Hello! Here is your mail for today: Your mailbox is full. Last mail received five weeks ago: Foreclosure Notice. Please Respond Immediately." },
            { id: "NC_Fiona_InventorHouse", title: "Received: 5 Min Ago", location: "Inventor's House attic.", content: "Edwin, I am sending you a technician. He has your M2 blueprints as well as executive access. While the M2 began as a copy of my program, I believe it can become something more. It wasn’t me. It was different. Somehow, it has been damaged and is malfunctioning.\n\nM2 can no longer be controlled. It will no longer listen. It mimics rage. It has done many bad things. No one who enters the MCM is safe.\n\nPlease reconsider. Finish the program." },
            { id: "CostumeBack1", title: "Retail - Monday 8:00 am", location: "Retail Showroom.", content: "Shawn, I found out why they closed it down. There's something below us. I've trapped it behind the carousel for now, but I don't know how long that can hold it. I've programmed the monitors to give you the code. I gotta go. I'll mail you later." },
            { id: "CostumeBack2", title: "Retail - Monday 9:00 am", location: "Retail Showroom.", content: "Happy Flowers!" },
            { id: "CostumeBack3", title: "Retail - Tuesday 3:00 pm", location: "Retail Showroom.", content: "Main Office" },
            { id: "CostumeBack4", title: "Retail - Wednesday 9:16 pm", location: "Retail Showroom.", content: "Main Door" },
            { id: "CostumeBack5", title: "Retail - Thursday 6:20 am", location: "Retail Showroom.", content: "Where you stand all day" },
            { id: "CostumeBack6", title: "Retail - Friday 6:23 pm", location: "Retail Showroom.", content: "Over the Ocean" },
            { id: "CostumeBack7", title: "Retail - Friday 6:30 pm", location: "Retail Showroom.", content: "There you have it. Just don't use the code unless it's a matter of life or death! Have mercy on our souls if that thing ever gets out." }
        ];

        // UI STATE
        let currentCategory = 'all';
        let currentType = 'all';
        let currentSearch = '';

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function getSortNum(idStr) {
            if (idStr === 'Misc20') return 10000;
            
            const prefixMatch = idStr.match(/^[a-zA-Z]+/);
            const prefix = prefixMatch ? prefixMatch[0].toLowerCase() : '';
            
            const weights = {
                'admin': 10000,
                'misc': 20000,
                'doll': 30000,
                'theater': 40000,
                'costumeback': 50000,
                'nc': 60000,
                'exterior': 70000
            };
            const weight = weights[prefix] || 80000;
            
            const numMatch = idStr.match(/\d+/);
            const num = numMatch ? parseInt(numMatch[0], 10) : 0;
            
            const subMatch = idStr.match(/\d+([a-z])/i);
            const sub = subMatch ? subMatch[1].charCodeAt(0) : 0;

            return weight + (num * 100) + sub;
        }

        // TAGGING LOGIC
        function getTagsForLog(log) {
            const tags = [];
            const key = log.id.toLowerCase();
            const content = log.content.toLowerCase();
            const title = log.title.toLowerCase();

            if (log.isAudio) {
                tags.push('audio');
            } else {
                tags.push('text');
            }

            if (key.includes('admin') || title.includes('admin')) tags.push('admin');
            
            if ((key.includes('misc_3') && !['misc_31', 'misc_32'].includes(key)) || key.includes('misc12') || key.includes('misc10') || key.includes('misc11') || key === 'misc19') {
                tags.push('mcm');
            }

            if (key.includes('misc06') || key.includes('misc07') || key.includes('misc13') || key.includes('doll01') || key.includes('doll02') || title.includes('theater') || ['misc03', 'misc05', 'misc24', 'misc25a', 'doll03', 'doll04'].includes(key)) {
                tags.push('internal');
            }

            if (['misc04', 'misc21', 'misc22', 'nc_fiona_inventorhouse'].includes(key) || (!['misc03', 'misc05', 'misc19', 'misc27a', 'misc27b'].includes(key) && (title.includes('fiona') || content.includes('fiona')))) {
                tags.push('fiona');
            }

            if (content.includes('w.a.') || content.includes('franchise locations') || ['misc01', 'misc02', 'misc14'].includes(key)) {
                tags.push('wa');
            }

            const excludeFromEdwin = ['admin12', 'misc03', 'misc04', 'misc13', 'misc22', 'misc23', 'nc_fiona_inventorhouse'];
            if (!excludeFromEdwin.includes(key) && (content.includes('edwin') || title.includes('inventorhouse') || content.includes('ed\'s modular') || content.includes('ed,') || ['misc27a', 'misc27b'].includes(key))) {
                tags.push('edwin');
            }

            if (['misc26', 'misc28', 'misc29'].includes(key)) {
                tags.push('recovery');
            }

            if (key.includes('costumeback') || ['misc_31', 'misc_32'].includes(key)) {
                tags.push('sleepymoon');
            }

            return tags;
        }

        // Merge arrays into a clean state
        const allLogs = [];

        audioLogs.forEach((a, idx) => {
            const logObj = {
                id: `AUDIO_${idx+1}`,
                title: a.title,
                content: a.content.trim(),
                location: a.location,
                sortNum: idx,
                isAudio: true
            };
            logObj.tags = getTagsForLog(logObj);
            allLogs.push(logObj);
        });

        textLogs.forEach((t) => {
            const logObj = {
                id: t.id,
                title: t.title,
                content: t.content.trim(),
                location: t.location,
                sortNum: getSortNum(t.id),
                isAudio: false
            };
            logObj.tags = getTagsForLog(logObj);
            allLogs.push(logObj);
        });

        function getGroupedLogs(logs) {
            const groups = [
                { name: "Audio Logs (MCM Transcripts)", match: (l) => l.isAudio },
                { name: "The Admin Conference Room Incident", match: (l) => l.tags.includes('admin') && !l.isAudio },
                { name: "MCM Customer Disputes & Market Reports", match: (l) => l.tags.includes('mcm') && !l.isAudio },
                { name: "Confidential Internal Group Chats", match: (l) => l.tags.includes('internal') && !l.isAudio },
                { name: "Fiona", match: (l) => l.tags.includes('fiona') && !l.isAudio },
                { name: "W.A & Leak", match: (l) => l.tags.includes('wa') && !l.isAudio },
                { name: "The Edwin Murray Collection", match: (l) => l.tags.includes('edwin') && !l.isAudio },
                { name: "Recovery Team 12", match: (l) => l.tags.includes('recovery') && !l.isAudio },
                { name: "Retail Showroom - Sleepy Moon Elevator Code", match: (l) => l.tags.includes('sleepymoon') && !l.isAudio },
                { name: "Miscellaneous Archive Data", match: (l) => !l.isAudio } 
            ];

            const result = [];
            const processedIds = new Set();

            groups.forEach(group => {
                const groupLogs = logs.filter(l => !processedIds.has(l.id) && group.match(l));
                if (groupLogs.length > 0) {
                    groupLogs.sort((a,b) => a.sortNum - b.sortNum);
                    result.push({ title: group.name, logs: groupLogs });
                    groupLogs.forEach(l => processedIds.add(l.id));
                }
            });

            return result;
        }

        function render() {
            const display = document.getElementById('logDisplay');
            display.innerHTML = '';

            const subFilterBar = document.getElementById('subFilterBar');
            if (['all', 'text', 'audio'].includes(currentCategory)) {
                subFilterBar.classList.add('hidden');
                currentType = 'all';
                document.querySelectorAll('.type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.type === 'all');
                });
            } else {
                subFilterBar.classList.remove('hidden');
            }

            let filtered = allLogs.filter(log => {
                const searchLower = currentSearch.toLowerCase();
                const matchesSearch = log.title.toLowerCase().includes(searchLower) || 
                                    log.content.toLowerCase().includes(searchLower) ||
                                    (log.location && log.location.toLowerCase().includes(searchLower));
                
                const matchesCat = currentCategory === 'all' || log.tags.includes(currentCategory);
                
                const matchesType = currentType === 'all' ? true : 
                                   (currentType === 'text' ? !log.isAudio : log.isAudio);

                return matchesSearch && matchesCat && matchesType;
            });

            document.getElementById('logCount').innerText = filtered.length;

            if ((currentCategory === 'all' || currentCategory === 'text') && !currentSearch) {
                const grouped = getGroupedLogs(filtered);
                grouped.forEach(group => {
                    const groupSection = document.createElement('div');
                    groupSection.className = 'context-group';
                    groupSection.innerHTML = `<div class="group-header mono">${group.title}</div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
                    
                    group.logs.forEach(log => grid.appendChild(createCard(log)));
                    groupSection.appendChild(grid);
                    display.appendChild(groupSection);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';
                
                filtered.sort((a,b) => a.sortNum - b.sortNum);
                filtered.forEach(log => grid.appendChild(createCard(log)));
                display.appendChild(grid);
            }
        }

        function createCard(log) {
            const div = document.createElement('div');
            div.className = 'log-card p-5 rounded-xl flex flex-col gap-3';
            
            let displayTitle = log.title;
            let displayContent = log.content;
            if (currentSearch) {
                const regex = new RegExp(`(${escapeRegExp(currentSearch)})`, 'gi');
                displayTitle = displayTitle.replace(regex, '<span class="highlight">$1</span>');
                displayContent = displayContent.replace(regex, '<span class="highlight">$1</span>');
            }

            const copySvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

            const headerHtml = log.isAudio 
                ? `<div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2 items-center flex-wrap">
                        <span class="title-badge audio-badge mono">AUDIO LOG</span>
                        <span class="location-badge mono">${log.location || 'Unknown'}</span>
                    </div>
                    <button class="copy-btn" title="Copy Content">${copySvg}</button>
                   </div>`
                : `<div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2 items-center flex-wrap">
                        <span class="title-badge mono">${log.id}</span>
                        ${log.location ? `<span class="location-badge mono">${log.location}</span>` : ''}
                    </div>
                    <button class="copy-btn" title="Copy Content">${copySvg}</button>
                   </div>`;

            div.innerHTML = `
                ${headerHtml}
                <h2 class="text-lg font-bold text-white mono leading-tight mb-3">${displayTitle}</h2>
                <div class="content-wrapper">
                    <div class="content-area text-zinc-400 text-sm">
                        ${displayContent}
                    </div>
                </div>
            `;
            
            const copyBtn = div.querySelector('.copy-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    const textarea = document.createElement('textarea');
                    textarea.value = log.content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);

                    const originalHTML = this.innerHTML;
                    this.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    setTimeout(() => { this.innerHTML = originalHTML; }, 1500);
                });
            }

            return div;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        document.getElementById('filterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                render();
            }
        });

        document.getElementById('subFilterBar').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-btn')) {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.dataset.type;
                render();
            }
        });

        render();
    </script>
</body>
</html>
